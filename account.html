<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>পকেট হিসাব | আল নোমান শিকদার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; transition: 0.3s; overflow-x: hidden; }
        
        .app-header { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); border-radius: 0 0 45px 45px; box-shadow: 0 15px 30px -10px rgba(5, 150, 105, 0.4); }
        .premium-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.02); }
        
        .dark { background-color: #020617; color: #f8fafc; }
        .dark .premium-card { background: #0f172a; border-color: #1e293b; }
        .dark .app-header { background: #0f172a; border-bottom: 1px solid #1e293b; box-shadow: none; }
        .dark input, .dark select { background: #1e293b !important; color: white; border: 1px solid #334155; }

        .time-circle { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .history-line { border-left: 3px solid #059669; padding-left: 15px; position: relative; margin-bottom: 12px; background: rgba(5, 150, 105, 0.05); border-radius: 12px; padding: 12px; }
        .dark .history-line { background: rgba(255, 255, 255, 0.03); }
        
        .month-pill.active { background: #059669 !important; color: white !important; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #loginOverlay { backdrop-filter: blur(15px); }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #offlineBadge { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 2000; display: none; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
        }
    </style>
</head>
<body class="pb-28">

    <!-- Offline Status Indicator -->
    <div id="offlineBadge" class="bg-rose-500 text-white px-4 py-1 rounded-full text-[10px] font-bold shadow-lg">অফলাইন মোড: ডাটা পরে সিঙ্ক হবে</div>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[40px] w-full max-w-sm shadow-2xl text-center">
            <div id="loginAvatar" class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 overflow-hidden">
                <i class="fas fa-user-lock text-3xl text-emerald-600"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">সুরক্ষিত এক্সেস</h2>
            <input type="password" id="adminPassInput" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 outline-none mb-4 text-center font-bold" placeholder="পাসওয়ার্ড দিন">
            <button onclick="attemptLogin()" id="loginBtn" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg">লগইন</button>
        </div>
    </div>

    <!-- Header -->
    <div class="app-header p-6 pb-12 text-white relative">
        <div class="flex justify-between items-center mb-5">
            <div class="flex items-center gap-3">
                <div onclick="switchTab('profile')" class="w-10 h-10 rounded-full border-2 border-white/20 overflow-hidden cursor-pointer">
                    <img id="headerProfileImg" src="https://via.placeholder.com/100" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 id="headerAdminName" class="text-lg font-bold italic">দৈনিক হিসাব</h1>
                    <div class="flex items-center text-[9px] opacity-80">
                        <span class="time-circle"></span><span id="liveClock">লোডিং...</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center transition active:scale-90"><i class="fas fa-moon text-sm"></i></button>
                <a href="https://shikdernumi.pro.bd" target="_blank" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center transition active:scale-90"><i class="fas fa-home text-sm"></i></a>
                <button onclick="showPeriodicNotif(false)" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center relative transition active:scale-90">
                    <i class="fas fa-bell text-sm"></i>
                    <span id="notifBadge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 border-2 border-emerald-700 rounded-full hidden"></span>
                </button>
                <button onclick="logoutApp()" class="w-8 h-8 rounded-full bg-red-500/20 text-red-200 flex items-center justify-center transition active:scale-90"><i class="fas fa-power-off text-sm"></i></button>
            </div>
        </div>

        <div class="text-center mb-6">
            <p class="text-[10px] opacity-75 uppercase tracking-[0.2em] mb-1 font-bold">মোট বর্তমান ব্যালেন্স</p>
            <h2 id="mainBalance" class="text-4xl font-black">৳ ০</h2>
        </div>

        <!-- Past Month Carry Forward -->
        <div class="bg-black/10 rounded-[28px] p-4 border border-white/5 backdrop-blur-sm grid grid-cols-3 gap-2 text-center">
            <div class="border-r border-white/10"><p class="text-[8px] opacity-70">স্থিতি</p><p id="openingBal" class="text-xs font-bold text-emerald-300">৳ ০</p></div>
            <div class="border-r border-white/10"><p class="text-[8px] opacity-70">বকেয়া লোন</p><p id="openingLoan" class="text-xs font-bold text-amber-300">৳ ০</p></div>
            <div><p class="text-[8px] opacity-70">বকেয়া ধার</p><p id="openingDhaar" class="text-xs font-bold text-blue-300">৳ ০</p></div>
        </div>
    </div>

    <!-- Global Month Scroll -->
    <div class="px-4 mt-4"><div id="monthContainer" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div></div>

    <!-- Dashboard -->
    <div class="px-4 mt-2 grid grid-cols-2 gap-3">
        <div class="premium-card p-3 border-l-4 border-emerald-500"><p class="text-[9px] font-bold uppercase opacity-60">আয়</p><p id="topInc" class="text-lg font-black text-emerald-600">৳ ০</p></div>
        <div class="premium-card p-3 border-l-4 border-rose-500"><p class="text-[9px] font-bold uppercase opacity-60">ব্যয়</p><p id="topExp" class="text-lg font-black text-rose-600">৳ ০</p></div>
        <div class="premium-card p-3 border-l-4 border-blue-500"><p class="text-[9px] font-bold uppercase opacity-60">এই মাসে শোধ</p><p id="topSodh" class="text-lg font-black text-blue-600">৳ ০</p></div>
        <div class="premium-card p-3 border-l-4 border-amber-500"><p class="text-[9px] font-bold uppercase opacity-60">লোন নিলাম</p><p id="topLoan" class="text-lg font-black text-amber-600">৳ ০</p></div>
    </div>

    <!-- Main Content -->
    <main class="mt-6 px-4">
        <div id="home-tab" class="tab-content"><div id="appList" class="space-y-3"></div></div>
        <div id="ledger-tab" class="tab-content hidden"><div id="ledgerList" class="space-y-6 pb-10"></div></div>
        <div id="profile-tab" class="tab-content hidden">
            <div class="premium-card p-6 text-center">
                <div class="relative w-24 h-24 mx-auto mb-4">
                    <img id="profilePreview" src="https://via.placeholder.com/100" class="w-full h-full rounded-full object-cover border-4 border-emerald-500">
                    <label for="imgUpload" class="absolute bottom-0 right-0 bg-emerald-600 w-8 h-8 rounded-full flex items-center justify-center cursor-pointer border-2 border-white"><i class="fas fa-camera text-xs text-white"></i></label>
                    <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <input type="text" id="adminNameInput" class="w-full text-center font-black text-xl bg-transparent border-b border-dashed border-slate-300 outline-none mb-6">
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="updateProfile()" class="py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm">সেভ করুন</button>
                    <button onclick="logoutApp()" class="py-3 bg-rose-500 text-white rounded-xl font-bold text-sm">লগআউট</button>
                </div>
                <hr class="mb-6 opacity-10">
                <h4 class="font-bold text-left mb-3 text-sm uppercase opacity-50 tracking-tighter">রিপোর্ট জেনারেটর (PDF)</h4>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="date" id="reportStart" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 text-xs border-none outline-none">
                    <input type="date" id="reportEnd" class="p-3 rounded-xl bg-slate-50 dark:bg-slate-800 text-xs border-none outline-none">
                </div>
                <button onclick="generatePDFReport()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold transition active:scale-95"><i class="fas fa-print mr-2"></i>প্রিন্ট / সেভ রিপোর্ট</button>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 px-6 py-2 flex justify-around items-center z-[100] rounded-t-[35px] shadow-2xl">
        <button onclick="switchTab('home')" class="nav-btn active-tab flex flex-col items-center p-2 text-emerald-600" id="btn-home"><i class="fas fa-receipt text-xl mb-1"></i><span class="text-[10px] font-bold">লেনদেন</span></button>
        <button onclick="switchTab('ledger')" class="nav-btn text-slate-400 flex flex-col items-center p-2" id="btn-ledger"><i class="fas fa-history text-xl mb-1"></i><span class="text-[10px] font-bold">ইতিহাস</span></button>
        <div class="mb-8"><button onclick="openEntryModal()" class="w-14 h-14 bg-emerald-600 text-white rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition-transform"><i class="fas fa-plus text-xl"></i></button></div>
        <button onclick="switchTab('profile')" class="nav-btn text-slate-400 flex flex-col items-center p-2" id="btn-profile"><i class="fas fa-user-circle text-xl mb-1"></i><span class="text-[10px] font-bold">প্রোফাইল</span></button>
    </nav>

    <!-- Modals -->
    <div id="entryModal" class="fixed inset-0 bg-black/60 hidden z-[500] items-end">
        <div class="bg-white dark:bg-slate-900 w-full rounded-t-[40px] p-8 modal-animate max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6"><h3 id="modalHeadText" class="text-xl font-bold">নতুন এন্ট্রি</h3><button onclick="closeModal()" class="text-2xl opacity-40">&times;</button></div>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3"><button onclick="setCatType('Income')" id="btnInc" class="py-3 rounded-2xl font-bold border-2 border-emerald-500 bg-emerald-50 text-emerald-600">আয় (+)</button><button onclick="setCatType('Expense')" id="btnExp" class="py-3 rounded-2xl font-bold border-2 border-slate-100 text-slate-400">ব্যয় (-)</button></div>
                <input type="hidden" id="mType" value="Income"><input type="hidden" id="editingId" value="">
                <div class="grid grid-cols-2 gap-3">
                    <select id="loanCat" onchange="autoSelectType()" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 text-xs font-bold outline-none border-none">
                        <option value="General">সাধারণ</option><option value="Loan">লোন নিলাম</option><option value="Loan_Paid">লোন শোধ</option><option value="Dhaar">ধার দিলাম</option><option value="Dhaar_Back">ধার ফেরত পেলাম</option>
                    </select>
                    <select id="mMethod" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 text-xs font-bold border-none outline-none">
                        <option value="নগদ">নগদ</option><option value="বিকাশ">বিকাশ</option><option value="নগদ অ্যাপ">নগদ অ্যাপ</option><option value="ব্যাংক">ব্যাংক</option>
                    </select>
                </div>
                <input type="text" id="mDesc" placeholder="বিবরণ" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 outline-none border-none">
                <div class="grid grid-cols-2 gap-3"><input type="number" id="mAmount" placeholder="টাকা" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold text-lg border-none"><input type="text" id="mPerson" placeholder="নাম" class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none"></div>
                <input type="datetime-local" id="mDate" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none">
                <div class="grid grid-cols-2 gap-3"><button onclick="clearModalInputs()" class="w-full bg-slate-500 text-white font-bold py-4 rounded-2xl">ক্লিয়ার</button><button id="saveBtn" onclick="saveData()" class="w-full bg-emerald-700 text-white font-bold py-4 rounded-2xl">সেভ করুন</button></div>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <div id="notifModal" class="fixed inset-0 bg-black/70 hidden z-[600] items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h3 class="text-xl font-black text-center mb-6 text-emerald-600">বকেয়া রিমাইন্ডার</h3>
            <div id="notifContent" class="space-y-3 max-h-80 overflow-y-auto no-scrollbar"></div>
            <button onclick="closeNotifModal()" class="w-full mt-6 py-4 bg-emerald-600 text-white font-bold rounded-2xl">ঠিক আছে</button>
        </div>
    </div>

    <script>
        let db = [];
        const proxyURL = '/api/account';
        const SESSION_LIMIT = 5 * 60 * 1000; // ৫ মিনিট
        let userPass = localStorage.getItem('app_pass') || "";
        const monthsBN = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
        let currentMonthKey = (new Date().getMonth()) + "-" + (new Date().getFullYear());
        const toBN = (n) => n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);

        // --- ইন্টারনেট চেক ও অফলাইন সিঙ্ক লজিক ---
        window.addEventListener('online', () => {
            document.getElementById('offlineBadge').style.display = 'none';
            syncOfflineData();
        });
        window.addEventListener('offline', () => {
            document.getElementById('offlineBadge').style.display = 'block';
        });

        async function syncOfflineData() {
            if (!navigator.onLine) return;
            const queue = JSON.parse(localStorage.getItem('offline_queue') || "[]");
            if (queue.length === 0) return;

            console.log("Syncing offline data...");
            for (let i = 0; i < queue.length; i++) {
                try {
                    const res = await fetch(proxyURL, { 
                        method: 'POST', 
                        body: new URLSearchParams(queue[i]) 
                    });
                    if (res.ok) {
                        queue.splice(i, 1);
                        i--; // অ্যারে রিসাইজ হ্যান্ডল করতে
                    }
                } catch (e) { break; } // সার্ভার এরর হলে লুপ থামিয়ে দিবে
            }
            localStorage.setItem('offline_queue', JSON.stringify(queue));
            if (queue.length === 0) fetchData(); // সিঙ্ক শেষে লেটেস্ট ডাটা আনবে
        }

        function saveToOfflineQueue(payload) {
            let queue = JSON.parse(localStorage.getItem('offline_queue') || "[]");
            queue.push(payload);
            localStorage.setItem('offline_queue', JSON.stringify(queue));
            
            // তাৎক্ষণিক ইউআই আপডেট (ইন্টারনেট না থাকলেও যেন লিস্টে দেখা যায়)
            db.push(payload);
            renderApp();
        }

        // --- অটো লগআউট ও সেশন লজিক ---
        function updateActivity() {
            if(userPass) localStorage.setItem('last_activity', Date.now());
        }

        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(evt => {
            window.addEventListener(evt, updateActivity);
        });

        function checkSession() {
            const lastActive = localStorage.getItem('last_activity');
            const now = Date.now();
            if (userPass && lastActive && (now - lastActive > SESSION_LIMIT)) {
                logoutApp();
                alert("৫ মিনিট কোনো কাজ না করায় অটোমেটিক লগআউট করা হয়েছে।");
            }
        }
        setInterval(checkSession, 10000);

        document.getElementById('adminPassInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });

        function updateClock() {
            const d = new Date();
            const dateStr = d.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
            let timeStr = d.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).replace('AM', 'এএম').replace('PM', 'পিএম');
            document.getElementById('liveClock').innerText = `${dateStr} | ${timeStr}`;
        }
        setInterval(updateClock, 1000);

        // --- Profile ---
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('profilePreview').src = e.target.result;
                    localStorage.setItem('admin_img', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updateProfile() {
            localStorage.setItem('admin_name', document.getElementById('adminNameInput').value);
            loadProfileData(); alert("প্রোফাইল আপডেট হয়েছে!");
        }
        function loadProfileData() {
            const name = localStorage.getItem('admin_name') || "স্মার্ট ইউজার";
            const img = localStorage.getItem('admin_img') || "https://via.placeholder.com/100";
            document.getElementById('headerAdminName').innerText = name;
            document.getElementById('adminNameInput').value = name;
            document.getElementById('headerProfileImg').src = img;
            document.getElementById('profilePreview').src = img;
        }

        // --- Auth ---
        async function attemptLogin() {
            const pass = document.getElementById('adminPassInput').value;
            if(!pass) return alert("পাসওয়ার্ড দিন");
            document.getElementById('loginBtn').innerText = "যাচাই...";
            try {
                const res = await fetch(`${proxyURL}?pass=${pass}`);
                if (res.ok) {
                    userPass = pass;
                    localStorage.setItem('app_pass', pass);
                    localStorage.setItem('last_activity', Date.now());
                    document.getElementById('loginOverlay').style.display = 'none';
                    fetchData();
                } else { alert("ভুল পাসওয়ার্ড!"); }
            } catch (e) { 
                // লগইন এর সময় অফলাইন থাকলে লোকাল পাসওয়ার্ড চেক (যদি আগে সেভ থাকে)
                if (localStorage.getItem('app_pass') === pass) {
                    userPass = pass;
                    document.getElementById('loginOverlay').style.display = 'none';
                    renderApp(); 
                } else {
                    alert("ইন্টারনেট নেই এবং আগে লগইন করা হয়নি!");
                }
            }
            document.getElementById('loginBtn').innerText = "লগইন";
        }

        async function fetchData() {
            if (!userPass) return;
            try {
                const res = await fetch(`${proxyURL}?pass=${userPass}`);
                const data = await res.json();
                db = Array.isArray(data) ? data : [];
                
                // অফলাইন ডাটা গুলো ইউআইতে মিশিয়ে দেখানো (সিঙ্ক না হওয়া পর্যন্ত)
                const queue = JSON.parse(localStorage.getItem('offline_queue') || "[]");
                queue.forEach(q => {
                    if (!db.find(d => d.id == q.id)) db.push(q);
                });

                renderApp();
                checkPeriodicNotifications();
            } catch (e) { 
                console.error("Fetch failed, showing cached data");
                renderApp();
            }
        }

        async function saveData() {
            const desc = document.getElementById('mDesc').value, amount = parseFloat(document.getElementById('mAmount').value);
            const person = document.getElementById('mPerson').value.trim() || "সাধারণ", type = document.getElementById('mType').value;
            const loanCat = document.getElementById('loanCat').value, date = document.getElementById('mDate').value;
            const method = document.getElementById('mMethod').value, editingId = document.getElementById('editingId').value;
            if(!desc || !amount) return alert("তথ্য দিন");
            
            const payload = { pass: userPass, id: editingId || Date.now(), desc, amount, person, type, loanCat, date, method, ts: new Date(date).getTime() };
            
            // অফলাইন চেক
            if (!navigator.onLine) {
                saveToOfflineQueue(payload);
                closeModal();
                return;
            }

            try {
                const res = await fetch(proxyURL, { method: 'POST', body: new URLSearchParams(payload) });
                if(res.ok) { closeModal(); fetchData(); }
                else { throw new Error(); }
            } catch (e) { 
                saveToOfflineQueue(payload);
                closeModal();
            }
        }

        async function deleteEntry(id) {
            if(!confirm("মুছে ফেলতে চান?")) return;
            if(!navigator.onLine) return alert("ডিলিট করার জন্য ইন্টারনেট প্রয়োজন।");
            try {
                const res = await fetch(`${proxyURL}?pass=${userPass}&action=delete&id=${id}`);
                if(res.ok) fetchData();
            } catch (e) { alert("ডিলিট এরর"); }
        }

        // --- Render ---
        function renderApp() {
            const list = document.getElementById('appList'); list.innerHTML = '';
            let totalBal = 0, openingBal = 0, openingLoan = 0, openingDhaar = 0;
            let mInc = 0, mExp = 0, mSodh = 0, mLoan = 0;

            const [selMonth, selYear] = currentMonthKey.split('-').map(Number);
            const startOfSelMonth = new Date(selYear, selMonth, 1).getTime();

            db.sort((a,b) => b.ts - a.ts).forEach(i => {
                const amt = parseFloat(i.amount);
                const isPlus = (i.type === 'Income' || i.loanCat === 'Dhaar_Back' || i.loanCat === 'Loan');
                totalBal += isPlus ? amt : -amt;

                if(i.ts < startOfSelMonth) {
                    openingBal += isPlus ? amt : -amt;
                    if(i.loanCat === 'Loan') openingLoan += amt;
                    if(i.loanCat === 'Loan_Paid') openingLoan -= amt;
                    if(i.loanCat === 'Dhaar') openingDhaar += amt;
                    if(i.loanCat === 'Dhaar_Back') openingDhaar -= amt;
                }

                if(new Date(i.date).getMonth() + "-" + new Date(i.date).getFullYear() === currentMonthKey) {
                    if(i.type === 'Income') mInc += amt;
                    if(i.type === 'Expense' && i.loanCat === 'General') mExp += amt;
                    if(i.loanCat === 'Loan_Paid' || i.loanCat === 'Dhaar_Back') mSodh += amt;
                    if(i.loanCat === 'Loan') mLoan += amt;

                    list.innerHTML += `<div class="premium-card p-4 flex justify-between items-center mb-3 group">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-emerald-500"><i class="fas ${isPlus ? 'fa-arrow-down':'fa-arrow-up text-rose-500'}"></i></div>
                            <div><div class="flex items-center gap-2"><h4 class="font-bold text-sm text-slate-700 dark:text-slate-200">${i.desc}</h4><span class="method-pill">${i.method}</span></div><p class="text-[9px] opacity-60">${i.person} • ${new Date(i.date).toLocaleDateString('bn-BD')}</p></div>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <p class="font-black ${isPlus ? 'text-emerald-600' : 'text-rose-600'}">৳${toBN(amt)}</p>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><i onclick="editEntry('${i.id}')" class="fas fa-edit text-blue-500 text-xs cursor-pointer"></i><i onclick="deleteEntry('${i.id}')" class="fas fa-trash text-rose-500 text-xs cursor-pointer"></i></div>
                        </div>
                    </div>`;
                }
            });

            document.getElementById('mainBalance').innerText = "৳ " + toBN(totalBal);
            document.getElementById('openingBal').innerText = "৳ " + toBN(openingBal);
            document.getElementById('openingLoan').innerText = "৳ " + toBN(openingLoan);
            document.getElementById('openingDhaar').innerText = "৳ " + toBN(openingDhaar);
            document.getElementById('topInc').innerText = "৳" + toBN(mInc);
            document.getElementById('topExp').innerText = "৳" + toBN(mExp);
            document.getElementById('topSodh').innerText = "৳" + toBN(mSodh);
            document.getElementById('topLoan').innerText = "৳" + toBN(mLoan);
            renderMonths(); updateNotifBadge();
        }

        function renderMonths() {
            const container = document.getElementById('monthContainer'); container.innerHTML = '';
            for(let i = 0; i < 12; i++) {
                const key = i + "-" + new Date().getFullYear();
                const pill = document.createElement('div');
                pill.className = `month-pill px-6 py-2 rounded-2xl premium-card text-[10px] font-bold cursor-pointer transition-all ${currentMonthKey === key ? 'active' : 'text-slate-400'}`;
                pill.innerText = monthsBN[i]; 
                pill.onclick = () => { currentMonthKey = key; renderApp(); if(document.getElementById('ledger-tab').style.display !== 'none') renderLedger(); };
                container.appendChild(pill);
            }
        }

        function renderLedger() {
            const container = document.getElementById('ledgerList'); container.innerHTML = '';
            const persons = [...new Set(db.filter(i => i.person !== "সাধারণ").map(i => i.person))];

            persons.forEach(name => {
                let lifetimeBal = 0;
                db.forEach(i => {
                    if(i.person === name) {
                        const amt = parseFloat(i.amount);
                        if(i.loanCat === 'Dhaar' || i.loanCat === 'Loan_Paid') lifetimeBal += amt;
                        if(i.loanCat === 'Loan' || i.loanCat === 'Dhaar_Back') lifetimeBal -= amt;
                    }
                });

                const isPaid = Math.abs(lifetimeBal) < 1;
                const monthlyHistory = db.filter(i => i.person === name && (new Date(i.date).getMonth() + "-" + new Date(i.date).getFullYear()) === currentMonthKey);
                if(monthlyHistory.length === 0 && isPaid) return;

                let historyHtml = monthlyHistory.map(h => `
                    <div class="history-line"><div class="flex justify-between items-center">
                        <div><span class="text-[10px] font-bold text-slate-400">${new Date(h.date).toLocaleDateString('bn-BD')}</span><br><span class="font-bold text-sm text-slate-700 dark:text-slate-200">${h.loanCat} (${h.method})</span></div>
                        <div class="flex items-center gap-3"><span class="font-black text-base ${h.loanCat.includes('Paid') || h.loanCat.includes('Dhaar') ? 'text-emerald-500':'text-rose-500'}">৳${toBN(h.amount)}</span>
                        <i onclick="deleteEntry('${h.id}')" class="fas fa-trash-alt text-slate-300 hover:text-rose-500 cursor-pointer"></i></div>
                    </div></div>`).join('');

                container.innerHTML += `<div class="premium-card p-6 border-t-8 ${isPaid ? 'border-emerald-500 bg-emerald-50/20':'border-amber-500'}">
                    <div class="flex justify-between items-center mb-6"><h4 class="font-black text-xl">${name}</h4><span class="px-3 py-1 rounded-full ${isPaid ? 'bg-emerald-500 text-white':'bg-amber-100 text-amber-700'} text-[9px] font-black uppercase">${isPaid ? 'পরিশোধিত':'চলমান'}</span></div>
                    <div class="space-y-2 mb-6">${historyHtml || '<p class="text-xs opacity-50 text-center">লেনদেন নেই</p>'}</div>
                    ${!isPaid ? `<p class="text-right text-base font-black text-amber-600">মোট বকেয়া: ৳${toBN(Math.abs(lifetimeBal))}</p>` : 
                    `<button class="w-full py-3 bg-emerald-600 text-white font-bold rounded-2xl text-sm shadow-lg shadow-emerald-200"><i class="fas fa-check-circle mr-2"></i>আপনার লোন সম্পূর্ণ পরিশোধ হয়েছে</button>`}
                </div>`;
            });
        }

        // --- PDF ---
        function generatePDFReport() {
            const start = document.getElementById('reportStart').value;
            const end = document.getElementById('reportEnd').value;
            if(!start || !end) return alert("তারিখ সিলেক্ট করুন");

            const st = new Date(start).getTime();
            const et = new Date(end).getTime() + 86400000;

            const filtered = db.filter(i => i.ts >= st && i.ts <= et);
            let html = `<div style="text-align:center; padding:20px; font-family: sans-serif;">
                <h2 style="margin:0">স্মার্ট লেজার রিপোর্ট</h2>
                <p>তারিখ: ${new Date(start).toLocaleDateString('bn-BD')} হতে ${new Date(end).toLocaleDateString('bn-BD')}</p>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:12px" border="1">
                <thead><tr style="background:#f2f2f2;"><th>তারিখ</th><th>বিবরণ</th><th>ব্যক্তি</th><th>ধরণ</th><th>টাকা</th></tr></thead>
                <tbody>`;
            
            let tInc = 0, tExp = 0;
            filtered.sort((a,b) => a.ts - b.ts).forEach(i => {
                const amt = parseFloat(i.amount);
                const isPlus = (i.type === 'Income' || i.loanCat === 'Dhaar_Back' || i.loanCat === 'Loan');
                if(isPlus) tInc += amt; else tExp += amt;
                html += `<tr><td>${new Date(i.date).toLocaleDateString('bn-BD')}</td><td>${i.desc}</td><td>${i.person}</td><td>${i.loanCat}</td><td>৳${i.amount}</td></tr>`;
            });
            html += `</tbody></table>
            <div style="margin-top:20px; text-align:right; font-weight:bold;">
                <p>মোট আয়: ৳${tInc} | মোট ব্যয়: ৳${tExp}</p>
                <p style="font-size:16px">নিট ব্যালেন্স: ৳${tInc - tExp}</p>
            </div>`;
            
            const area = document.getElementById('printArea'); area.innerHTML = html;
            window.print();
        }

        // --- UI ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-emerald-600'); b.classList.add('text-slate-400'); });
            document.getElementById(`${tab}-tab`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.replace('text-slate-400', 'text-emerald-600');
            if(tab === 'ledger') renderLedger();
        }
        function autoSelectType() {
            const cat = document.getElementById('loanCat').value;
            if (cat === 'Loan' || cat === 'Dhaar_Back') setCatType('Income');
            else if (cat === 'Loan_Paid' || cat === 'Dhaar') setCatType('Expense');
        }
        function setCatType(type) {
            document.getElementById('mType').value = type;
            document.getElementById('btnInc').className = type === 'Income' ? "py-3 rounded-2xl font-bold border-2 border-emerald-500 bg-emerald-50 text-emerald-600" : "py-3 rounded-2xl font-bold border-2 border-slate-100 text-slate-400";
            document.getElementById('btnExp').className = type === 'Expense' ? "py-3 rounded-2xl font-bold border-2 border-rose-500 bg-rose-50 text-rose-600" : "py-3 rounded-2xl font-bold border-2 border-slate-100 text-slate-400";
        }
        function editEntry(id) {
            const i = db.find(x => x.id == id); if(!i) return;
            openEntryModal(); document.getElementById('editingId').value = i.id;
            document.getElementById('mDesc').value = i.desc; document.getElementById('mAmount').value = i.amount;
            document.getElementById('mPerson').value = i.person === "সাধারণ" ? "" : i.person;
            document.getElementById('loanCat').value = i.loanCat; document.getElementById('mMethod').value = i.method;
            document.getElementById('mDate').value = i.date; setCatType(i.type);
            document.getElementById('saveBtn').innerText = "আপডেট করুন";
        }
        function calculateNetSummary() {
            const summary = {};
            db.forEach(i => {
                if(i.person === "সাধারণ") return;
                if(!summary[i.person]) summary[i.person] = 0;
                const amt = parseFloat(i.amount);
                if(i.loanCat === 'Dhaar' || i.loanCat === 'Loan_Paid') summary[i.person] += amt;
                if(i.loanCat === 'Loan' || i.loanCat === 'Dhaar_Back') summary[i.person] -= amt;
            });
            return summary;
        }
        function showPeriodicNotif(isAuto = false) {
            const content = document.getElementById('notifContent'); content.innerHTML = '';
            const summary = calculateNetSummary();
            let hasPending = false;
            for(let name in summary) {
                if(Math.abs(summary[name]) > 1) {
                    hasPending = true;
                    content.innerHTML += `<div class="p-4 rounded-3xl ${summary[name] < 0 ? 'bg-rose-50 dark:bg-rose-900/10':'bg-blue-50 dark:bg-blue-900/10'} border border-opacity-20"><div class="flex justify-between items-center"><div><p class="text-[9px] font-bold uppercase opacity-50">${summary[name] < 0 ? 'সে পাবে' : 'আপনি পাবেন'}</p><h4 class="font-bold">${name}</h4></div><p class="font-black text-lg">৳${toBN(Math.abs(summary[name]))}</p></div></div>`;
                }
            }
            if(hasPending) document.getElementById('notifModal').style.display = 'flex';
            else if(!isAuto) alert("সব হিসাব পরিষ্কার!");
        }
        function checkPeriodicNotifications() {
            const last = localStorage.getItem('last_notif_time');
            if (!last || (Date.now() - last) > (3 * 24 * 60 * 60 * 1000)) {
                showPeriodicNotif(true); localStorage.setItem('last_notif_time', Date.now());
            }
        }
        function updateNotifBadge() {
            const summary = calculateNetSummary();
            const hasPending = Object.values(summary).some(val => Math.abs(val) > 1);
            document.getElementById('notifBadge').style.display = hasPending ? 'block' : 'none';
        }
        function logoutApp() { 
            localStorage.removeItem('app_pass'); 
            localStorage.removeItem('last_activity');
            location.reload(); 
        }
        function toggleDarkMode() { document.body.classList.toggle('dark'); }
        function closeModal() { document.getElementById('entryModal').style.display = 'none'; }
        function openEntryModal() { document.getElementById('entryModal').style.display = 'flex'; clearModalInputs(); }
        function closeNotifModal() { document.getElementById('notifModal').style.display = 'none'; }
        function clearModalInputs() {
            document.getElementById('mDesc').value = ''; document.getElementById('mAmount').value = '';
            document.getElementById('mPerson').value = ''; document.getElementById('editingId').value = '';
            document.getElementById('mDate').value = new Date().toISOString().slice(0, 16);
            document.getElementById('saveBtn').innerText = "সেভ করুন";
        }
        
        window.onload = () => { 
            loadProfileData();
            if (userPass) { 
                document.getElementById('loginOverlay').style.display = 'none'; 
                fetchData(); 
                syncOfflineData(); // অ্যাপ লোড হলে সিঙ্ক চেক করবে
                updateActivity();
            } 
            updateClock();
            if(!navigator.onLine) document.getElementById('offlineBadge').style.display = 'block';
        };
    </script>
</body>
</html>
