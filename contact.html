<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./android-chrome-512x512.png">
    <title>যোগাযোগ | আল নোমান শিকদার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#8b5cf6', secondary: '#6366f1', accent: '#f43f5e' },
                    boxShadow: { 'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.5)', 'glow': '0 0 25px rgba(139, 92, 246, 0.4)' }
                }
            }
        }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Al Noman Shikder",
      "alternateName": ["নোমান", "Noman", "নোমান শিকদার", "Noman Shikder"],
      "url": "https://shikdernumi.pro.bd/contact",
      "brand": {
        "@type": "Brand",
        "name": "Numi"
      }
    }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s; overflow-x: hidden; }
        .glass { backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); border-color: rgba(255,255,255,0.08); }
        .light .glass { background: rgba(255, 255, 255, 0.8); border-color: rgba(0,0,0,0.05); }
        .animate-fade { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .input-style { background: rgba(148, 163, 184, 0.08); border: 1px solid rgba(148, 163, 184, 0.2); outline: none; transition: 0.3s; color: inherit; }
        .input-style:focus { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.15); transform: scale(1.01); }
        
        .shape { position: fixed; z-index: -1; filter: blur(100px); border-radius: 50%; opacity: 0.15; }
        .shape-1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; }
        .shape-2 { width: 350px; height: 350px; background: #6366f1; bottom: -50px; right: -50px; }
        
        #mobile-menu { transition: all 0.4s ease; transform: translateY(-20px); opacity: 0; pointer-events: none; }
        #mobile-menu.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-200 min-h-screen" id="bodyTag">

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-xl">
    <a href="index.html" class="group">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl overflow-hidden shadow-lg border-2 border-primary/30 group-hover:border-primary transition-all">
                <img src="https://lh3.googleusercontent.com/u/0/d/1J0Hu9ZoO3-6A-5u8emTH0bbr4sb5w4SN" alt="Al Noman" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-bold tracking-tight dark:text-white text-slate-900">আল নোমান শিকদার</span>
            </div>
        </div>
    </a>

        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white/5 hover:bg-primary/10 transition-all text-xl">
                <span id="themeIcon">☀️</span>
            </button>
            <div class="hidden md:flex items-center gap-8 font-bold">
                <a href="index.html" class="hover:text-primary transition-colors">হোম</a>
                <button onclick="showLogin()" class="bg-primary text-white px-8 py-2.5 rounded-2xl text-sm shadow-glow transition-all">অ্যাডমিন লগইন</button>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden p-2 text-3xl"><span id="menuIcon">☰</span></button>
        </div>

        <div id="mobile-menu" class="absolute top-20 left-6 right-6 glass p-8 rounded-[2.5rem] shadow-premium md:hidden flex flex-col gap-5 text-center z-[110]">
            <a href="#" class="py-2 text-lg font-bold">হোম</a>
            <button onclick="showLogin(); toggleMobileMenu();" class="bg-primary text-white py-4 rounded-2xl font-bold shadow-glow">অ্যাডমিন লগইন</button>
        </div>
    </nav>

    <main id="contact-section" class="max-w-6xl mx-auto py-16 px-6 animate-fade">
    <div class="grid lg:grid-cols-5 gap-16 items-center">
        <div class="lg:col-span-2 space-y-8">
            <div class="space-y-4">
                <h1 class="text-5xl font-extrabold leading-tight">চলুন নতুন কিছু <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">শুরু করি!</span></h1>
                <p class="text-slate-400 text-lg leading-relaxed">
                    আমি <span class="text-primary font-semibold">জোসনা রাত</span>, বৃষ্টির শব্দ আর এক কাপ ধোঁয়া ওঠা <span class="text-primary font-semibold">চা</span> ভীষণ ভালোবাসি। 
                    আপনার কোনো কথা বা কাজের প্রস্তাব থাকলে নির্দ্বিধায় পাঠান।
                </p>
            </div>
            <div class="flex gap-4 p-6 glass rounded-[2rem] w-fit">
                <span class="text-2xl hover:scale-125 transition-transform cursor-default">🌊</span>
                <span class="text-2xl hover:scale-125 transition-transform cursor-default">⛰️</span>
                <span class="text-2xl hover:scale-125 transition-transform cursor-default">🏍️</span>
                <span class="text-2xl hover:scale-125 transition-transform cursor-default">🚗</span>
                <span class="text-2xl hover:scale-125 transition-transform cursor-default">☕</span>
            </div>
        </div>

        <div class="lg:col-span-3 glass p-8 md:p-12 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
            
            <form id="contactForm" class="space-y-6 relative z-10">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest ml-1 opacity-60">নাম</label>
                        <input type="text" name="name" required placeholder="পুরো নাম" class="input-style w-full p-4 rounded-2xl text-slate-900 dark:text-white bg-white/5">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest ml-1 opacity-60">মোবাইল নাম্বার</label>
                        <input type="tel" name="phone" id="phoneInput" onblur="formatPhone(this)" required placeholder="01XXXXXXXXX" class="input-style w-full p-4 rounded-2xl text-slate-900 dark:text-white bg-white/5">
                    </div>
                </div>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest ml-1 opacity-60">ইমেইল</label>
                        <input type="email" name="email" placeholder="example@mail.com" class="input-style w-full p-4 rounded-2xl text-slate-900 dark:text-white bg-white/5">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest ml-1 opacity-60">বিষয়</label>
                        <input type="text" name="subject" required placeholder="কি সম্পর্কে?" class="input-style w-full p-4 rounded-2xl text-slate-900 dark:text-white bg-white/5">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest ml-1 opacity-60">বার্তা</label>
                    <textarea name="message" rows="4" required placeholder="আপনার মনের কথা এখানে লিখুন..." class="input-style w-full p-4 rounded-2xl text-slate-900 dark:text-white bg-white/5"></textarea>
                </div>

                <button type="submit" id="sendBtn" class="w-full bg-gradient-to-r from-primary to-secondary py-5 rounded-2xl font-bold text-white shadow-xl hover:scale-[1.02] active:scale-95 transition-all text-lg uppercase tracking-widest">
                    বার্তা পাঠান ✨
                </button>
            </form>
            <div id="status" class="text-center mt-6 font-bold py-4 rounded-2xl hidden animate-fade"></div>
        </div>
    </div>
</main>

    <section id="admin-section" class="max-w-7xl mx-auto py-16 px-6 hidden animate-fade">
        <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
            <h2 class="text-5xl font-black flex items-center gap-4">📬 ইনবক্স</h2>
            <div class="flex gap-4 font-bold">
                <button onclick="fetchMessages()" class="bg-blue-500/10 text-blue-500 px-6 py-3 rounded-2xl hover:bg-blue-500 hover:text-white transition-all">রিফ্রেশ</button>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-2xl hover:bg-red-500 hover:text-white transition-all">লগআউট</button>
            </div>
        </div>
        <div id="messages-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <div id="login-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl hidden flex items-center justify-center p-6 z-[200]">
        <div class="glass p-12 w-full max-w-sm rounded-[3.5rem] border-primary/20 text-center shadow-premium animate-fade">
            <div class="w-20 h-20 bg-primary/20 rounded-3xl flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner">🔐</div>
            <h3 class="text-2xl font-bold mb-8">অ্যাডমিন লগইন</h3>
            <input type="password" id="adminPass" onkeydown="if(event.key==='Enter') accessAdmin()" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-3xl tracking-[10px] outline-none mb-8 focus:border-primary">
            <div class="flex gap-4 font-bold">
                <button onclick="hideLogin()" class="flex-1 opacity-50">বাতিল</button>
                <button onclick="accessAdmin()" id="loginBtn" class="flex-1 bg-primary py-4 rounded-2xl font-bold text-white shadow-xl">লগইন</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-2xl hidden flex items-center justify-center p-6 z-[210]">
        <div class="glass p-8 w-full max-w-lg rounded-[2.5rem] animate-fade">
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-2 text-primary">📝 বার্তা এডিট করুন</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editRowId">
                <input type="text" id="editName" placeholder="নাম" class="input-style w-full p-4 rounded-xl">
                <input type="tel" id="editPhone" placeholder="মোবাইল" class="input-style w-full p-4 rounded-xl">
                <textarea id="editMessage" rows="4" class="input-style w-full p-4 rounded-xl"></textarea>
                <div class="flex gap-4 pt-4 font-bold">
                    <button type="button" onclick="closeEdit()" class="flex-1 opacity-60">বাতিল</button>
                    <button type="submit" class="flex-1 bg-green-600 py-4 rounded-xl text-white">আপডেট</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] opacity-0 transition-all pointer-events-none border border-white/10 flex items-center gap-3">
        <span id="toastIcon">✅</span> <span id="toastMsg">সফল হয়েছে!</span>
    </div>

    <script>
    // এই লিঙ্কটি এখন আপনার Vercel API-এর দিকে পয়েন্ট করবে
    const proxyURL = '/api/contact'; 
    let currentPass = "";

    function formatPhone(input) {
        let val = input.value.trim();
        if (val && !val.startsWith('0')) { input.value = '0' + val; }
    }

    function toggleTheme() {
        const body = document.getElementById('bodyTag');
        const icon = document.getElementById('themeIcon');
        const isDark = body.classList.toggle('dark');
        icon.innerText = isDark ? '☀️' : '🌙';
        body.style.background = isDark ? "#020617" : "#f1f5f9";
        body.style.color = isDark ? "#f1f5f9" : "#0f172a";
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const isActive = menu.classList.toggle('active');
        document.getElementById('menuIcon').innerText = isActive ? '✕' : '☰';
    }

    function showLogin() { document.getElementById('login-modal').classList.remove('hidden'); document.getElementById('adminPass').focus(); }
    function hideLogin() { document.getElementById('login-modal').classList.add('hidden'); }
    function logout() { location.reload(); }

    function accessAdmin() {
        const pass = document.getElementById('adminPass').value;
        currentPass = pass; // সরাসরি ইউজারের পাসওয়ার্ড স্টোর করুন
        // পাসওয়ার্ড সঠিক কিনা তা প্রথমবার ডেটা ফেচ করলেই বোঝা যাবে
        fetchMessages(); 
    }

    function fetchMessages() {
        const container = document.getElementById('messages-container');
        container.innerHTML = `<div class="col-span-full text-center py-20 opacity-50 text-xl animate-pulse">লোড হচ্ছে...</div>`;
        
        // পাসওয়ার্ডটি কুয়েরি প্যারামিটারে পাঠিয়ে প্রক্সি সার্ভারে চেক করা হবে
        fetch(`${proxyURL}?pass=${currentPass}`).then(res => {
            if (res.status === 401) {
                alert("ভুল পাসওয়ার্ড!");
                document.getElementById('adminPass').value = "";
                throw new Error("Unauthorized");
            }
            return res.json();
        }).then(data => {
            container.innerHTML = "";
            document.getElementById('contact-section').classList.add('hidden');
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');

            if(!data || data.length === 0) {
                container.innerHTML = "<p class='col-span-full text-center py-20 text-2xl'>ইনবক্স খালি! 📭</p>";
                return;
            }
            data.reverse().forEach((msg) => {
                const dateObj = new Date(msg.time || msg.date);
                const formattedDate = isNaN(dateObj) ? "তারিখ পাওয়া যায়নি" : dateObj.toLocaleString('bn-BD', {
                    hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'long', year: 'numeric'
                });

                container.innerHTML += `
                    <div class="glass p-7 rounded-[3rem] border-t-4 border-primary shadow-premium animate-fade relative hover:-translate-y-2 transition-all duration-500 overflow-hidden">
                        <div class="flex justify-between items-start mb-5 relative z-10">
                            <span class="bg-primary/20 text-primary text-[10px] px-3 py-1 rounded-full font-black tracking-widest uppercase">আইডি: ${msg.id}</span>
                            <div class="flex gap-2">
                                <button onclick="openEdit('${msg.id}', '${msg.name}', '${msg.phone}', '${msg.message}')" class="text-xl hover:scale-125 transition">✏️</button>
                                <button onclick="deleteMsg('${msg.id}')" class="text-xl hover:scale-125 transition">🗑️</button>
                            </div>
                        </div>
                        <h4 class="text-2xl font-black mb-1 relative z-10">${msg.name}</h4>
                        <div onclick="copyToClipboard('${msg.phone}')" class="inline-flex items-center gap-2 cursor-pointer bg-slate-500/10 px-4 py-2 rounded-xl mt-1 hover:bg-primary hover:text-white transition-all text-sm font-bold">
                            📞 ${msg.phone}
                        </div>
                        <p class="text-[11px] opacity-60 mt-5 mb-5 font-bold flex items-center gap-2">🕒 ${formattedDate}</p>
                        <div class="bg-slate-500/5 p-5 rounded-[2rem] border border-white/5 shadow-inner">
                            <p class="text-[10px] font-black text-primary opacity-60 uppercase mb-2">বিষয়: ${msg.subject}</p>
                            <p class="text-sm leading-relaxed">${msg.message}</p>
                        </div>
                    </div>`;
            });
        }).catch(err => {
            console.error(err);
        });
    }

    function deleteMsg(id) {
        if(confirm("মেসেজটি ডিলিট করতে চান?")) {
            showToast("ডিলিট হচ্ছে...", "info");
            fetch(`${proxyURL}?action=delete&id=${id}&pass=${currentPass}`)
            .then(res => res.json()).then(res => {
                if(res.result === 'deleted') { showToast("সফলভাবে ডিলিট হয়েছে!", "success"); fetchMessages(); }
            });
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.style.opacity = "1";
        toast.style.transform = "translate(-50%, -20px)";
        setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translate(-50%, 0)"; }, 3000);
    }

    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast("নাম্বার কপি হয়েছে!")); }

    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "পাঠানো হচ্ছে...";
        
        fetch(proxyURL, { 
            method: 'POST', 
            body: new URLSearchParams(new FormData(this)).toString(),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(() => { 
            showToast("সফলভাবে পাঠানো হয়েছে! ✅"); 
            this.reset(); 
            btn.innerText = "বার্তা পাঠান ✨"; 
        });
    });

    if(localStorage.getItem('theme') === 'light') toggleTheme();
</script>
</body>
</html>
