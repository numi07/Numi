<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফটো গ্যালারি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --bg: #050505;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); }

        /* স্লাইডার সেকশন */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .sec-bg { font-size: 8rem; opacity: 0.03; position: absolute; pointer-events: none; font-weight: 700; text-transform: uppercase; }

        .slider-viewport { height: 400px; width: 100%; perspective: 1500px; display: flex; justify-content: center; align-items: center; }
        .drum { position: relative; width: 220px; height: 320px; transform-style: preserve-3d; }
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 15px; 
            overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ক্যাপশন স্টাইল */
        .card-caption {
            position: absolute; bottom: 0; width: 100%; padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff; font-size: 14px; text-align: center; font-weight: 300;
        }

        .controls { display: flex; gap: 20px; margin-top: 40px; z-index: 10; }
        .btn-slide { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-slide:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }

        /* অ্যাডমিন প্যানেল ফিক্সড ডিজাইন */
        .admin-nav { position: fixed; top: 80px; right: 20px; z-index: 1100; }
        .admin-toggle { 
            background: rgba(0, 210, 255, 0.1); color: var(--primary); 
            border: 1px solid var(--primary); padding: 8px 18px; 
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        .glass-box {
            background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(25px);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            width: 320px; position: absolute; right: 0; top: 50px;
            display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        
        /* উন্নত ফরম ডিজাইন */
        .upload-form-ui { display: flex; flex-direction: column; gap: 12px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        
        .up-btn { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; font-size: 16px; }
        .up-btn:hover { background: #00b8e6; }
        .up-btn:disabled { opacity: 0.5; }

        #msg { font-size: 13px; text-align: center; margin-top: 10px; color: var(--primary); font-weight: 500; }
        
        #previewBox { margin-top: 10px; display: none; text-align: center; border: 2px dashed var(--primary); padding: 5px; border-radius: 12px; background: rgba(0,210,255,0.05); }
        #imgPreview { width: 100%; border-radius: 8px; max-height: 150px; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo">আল নোমান শিকদার</div>
        <nav>
            <span style="cursor:pointer; margin-right:15px;" onclick="gsap.to(window, {scrollTo: '#self-sec'})">নিজ</span>
            <span style="cursor:pointer; margin-right:15px;" onclick="gsap.to(window, {scrollTo: '#flower-sec'})">ফুল</span>
            <span style="cursor:pointer;" onclick="gsap.to(window, {scrollTo: '#nature-sec'})">প্রকৃতি</span>
        </nav>
    </header>

    <!-- অ্যাডমিন সেকশন -->
    <div class="admin-nav">
        <button class="admin-toggle" id="adminBtn" onclick="toggleAdmin()">লগিন</button>
        
        <div class="glass-box" id="adminBox">
            <!-- লগিন এরিয়া -->
            <div id="authArea">
                <p style="text-align:center; font-weight:bold; margin-bottom:10px; letter-spacing: 1px;">অ্যাডমিন এক্সেস</p>
                <input type="password" id="adminPassInput" placeholder="পাসওয়ার্ড লিখুন" onkeydown="if(event.key==='Enter') checkPass()">
                <button onclick="checkPass()" style="background:var(--primary); color:#000; font-weight: bold;">ভেরিফাই</button>
            </div>

            <!-- উন্নত আপলোড এরিয়া -->
            <form id="uploadForm" class="upload-form-ui" style="display:none;">
                <p style="text-align:center; font-weight:bold; color:var(--primary); font-size: 18px;">নতুন ফটো যোগ করুন</p>
                
                <div style="position: relative;">
                    <input type="file" id="fileInp" accept="image/*" required style="font-size: 12px;">
                </div>

                <div id="previewBox">
                    <img id="imgPreview" src="">
                </div>

                <input type="text" id="fileCaption" placeholder="ছবির ক্যাপশন লিখুন...">
                
                <select id="fileCat">
                    <option value="নিজ">নিজ (Self)</option>
                    <option value="ফুল">ফুল (Flower)</option>
                    <option value="প্রকৃতি">প্রকৃতি (Nature)</option>
                </select>
                
                <button type="submit" class="up-btn" id="subBtn">সার্ভারে আপলোড করুন</button>
                <button type="button" onclick="logout()" style="background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; font-size: 12px; margin-top: 5px;">লগআউট</button>
            </form>
            <p id="msg"></p>
        </div>
    </div>

    <!-- সেকশন গুলো -->
    <section id="self-sec">
        <div class="sec-bg">PERSONAL</div>
        <div class="slider-viewport"><div class="drum" id="self-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('self', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('self', -1)">→</div>
        </div>
    </section>

    <section id="flower-sec">
        <div class="sec-bg">FLOWERS</div>
        <div class="slider-viewport"><div class="drum" id="flower-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('flower', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('flower', -1)">→</div>
        </div>
    </section>

    <section id="nature-sec">
        <div class="sec-bg">NATURE</div>
        <div class="slider-viewport"><div class="drum" id="nature-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('nature', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('nature', -1)">→</div>
        </div>
    </section>

    <script>
        const GALLERY_API_URL = "/api/gallery";
        const rotLog = { self: 0, flower: 0, nature: 0 };
        let idleTimer;

        // ১. লগিন বক্স দেখানো/লুকানো
        function toggleAdmin() {
            const adminBox = document.getElementById('adminBox');
            if (adminBox.style.display === "none" || adminBox.style.display === "") {
                adminBox.style.display = "block";
                gsap.from(adminBox, { opacity: 0, y: -20, duration: 0.4 });
            } else {
                adminBox.style.display = "none";
            }
        }

        // ২. পাসওয়ার্ড চেক এবং সেশন হ্যান্ডলিং
        async function checkPass() {
            const pass = document.getElementById('adminPassInput').value;
            const msg = document.getElementById('msg');
            
            if(!pass) return;
            msg.innerText = "যাচাই হচ্ছে...";

            try {
                const res = await fetch(`${GALLERY_API_URL}?action=login&pass=${encodeURIComponent(pass)}`);
                const result = await res.json();

                if(res.ok && result.success) {
                    setLoggedIn();
                } else {
                    msg.innerText = "ভুল পাসওয়ার্ড!";
                    msg.style.color = "#ff4d4d";
                    gsap.to("#adminBox", { x: 10, repeat: 3, yoyo: true, duration: 0.05 });
                }
            } catch (err) {
                msg.innerText = "সার্ভার এরর!";
            }
        }

        function setLoggedIn() {
            localStorage.setItem('nomans_auth', 'true');
            localStorage.setItem('auth_time', Date.now());
            showUploadForm();
            resetIdleTimer();
        }

        function showUploadForm() {
            document.getElementById('authArea').style.display = 'none';
            document.getElementById('uploadForm').style.display = 'flex';
            document.getElementById('adminBtn').innerText = "অ্যাডমিন প্যানেল";
            document.getElementById('msg').innerText = "স্বাগতম, নোমান!";
            document.getElementById('msg').style.color = "#00d2ff";
        }

        function logout() {
            localStorage.removeItem('nomans_auth');
            localStorage.removeItem('auth_time');
            location.reload();
        }

        // ৫ মিনিটের অটো লগআউট লজিক
        function resetIdleTimer() {
            if(localStorage.getItem('nomans_auth')) {
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => {
                    alert("৫ মিনিট ইনঅ্যাক্টিভ থাকায় নিরাপত্তার জন্য লগআউট করা হলো।");
                    logout();
                }, 300000); // 5 minutes
            }
        }

        // ইউজার অ্যাক্টিভিটি ট্র্যাকিং
        window.onmousemove = resetIdleTimer;
        window.onkeydown = resetIdleTimer;
        window.onclick = resetIdleTimer;

        // ৩. ফটো প্রিভিউ
        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imgPreview').src = ev.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // ৪. আপলোড লজিক (ক্যাপশন সহ)
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msg = document.getElementById('msg');
            const file = document.getElementById('fileInp').files[0];
            const caption = document.getElementById('fileCaption').value;

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const res = await fetch(GALLERY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fileData: reader.result,
                            filename: file.name,
                            caption: caption,
                            category: document.getElementById('fileCat').value
                        })
                    });
                    if(res.ok) {
                        msg.innerText = "সফলভাবে আপলোড হয়েছে!";
                        msg.style.color = "#00ff88";
                        document.getElementById('uploadForm').reset();
                        document.getElementById('previewBox').style.display = 'none';
                        loadGallery(); // রিলোড ছাড়াই ডাটা আপডেট
                    }
                } catch (err) { msg.innerText = "ব্যর্থ হয়েছে!"; }
                btn.disabled = false;
                btn.innerText = "সার্ভারে আপলোড করুন";
            };
        };

        // ৫. গ্যালারি ডাটা লোড ও ড্রাম রোটেশন
        async function loadGallery() {
            try {
                const res = await fetch(GALLERY_API_URL);
                const data = await res.json();
                renderCategory('self', data.filter(i => i.category === 'নিজ'));
                renderCategory('flower', data.filter(i => i.category === 'ফুল'));
                renderCategory('nature', data.filter(i => i.category === 'প্রকৃতি'));
            } catch (e) { console.log("Load error"); }
        }

        function renderCategory(cat, images) {
            const container = document.getElementById(`${cat}-drum`);
            if(!images.length) {
                container.innerHTML = '<p style="font-size:12px; opacity:0.5; position:absolute; width:100%; text-align:center;">কোন ছবি নেই</p>';
                return;
            }
            container.innerHTML = images.map(img => `
                <div class="card">
                    <img src="${img.url}">
                    ${img.caption ? `<div class="card-caption">${img.caption}</div>` : ''}
                </div>
            `).join('');
            rotateDrum(cat, 0);
        }

        function rotateDrum(cat, dir) {
            const drum = document.getElementById(`${cat}-drum`);
            const cards = drum.querySelectorAll('.card');
            if(!cards.length) return;
            const step = 360 / cards.length;
            rotLog[cat] += step * dir;
            cards.forEach((card, i) => {
                const angle = (i * step) + rotLog[cat];
                const rad = angle * Math.PI / 180;
                gsap.to(card, {
                    x: Math.sin(rad) * 450,
                    z: Math.cos(rad) * 450,
                    rotationY: angle,
                    duration: 1.2,
                    ease: "power2.out"
                });
            });
        }

        window.onload = () => {
            loadGallery();
            // রিলোড করলে লগিন অবস্থা চেক
            if(localStorage.getItem('nomans_auth') === 'true') {
                showUploadForm();
                resetIdleTimer();
            }
        };
    </script>
</body>
</html>
