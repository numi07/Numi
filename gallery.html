<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফটো গ্যালারি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --bg: #050505;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); }

        /* স্লাইডার সেকশন */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .sec-bg { font-size: 8rem; opacity: 0.03; position: absolute; pointer-events: none; font-weight: 700; }

        .slider-viewport { height: 400px; width: 100%; perspective: 1500px; display: flex; justify-content: center; align-items: center; }
        .drum { position: relative; width: 220px; height: 320px; transform-style: preserve-3d; }
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 15px; 
            overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .controls { display: flex; gap: 20px; margin-top: 40px; z-index: 10; }
        .btn-slide { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; }

        /* অ্যাডমিন প্যানেল ফিক্সড ডিজাইন */
        .admin-nav { position: fixed; top: 80px; right: 20px; z-index: 1100; }
        .admin-toggle { 
            background: rgba(0, 210, 255, 0.1); color: var(--primary); 
            border: 1px solid var(--primary); padding: 8px 18px; 
            border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .glass-box {
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 1px solid var(--border);
            width: 280px; position: absolute; right: 0; top: 50px;
            display: none; /* শুরুতে লুকানো থাকবে */
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; outline: none; }
        .up-btn { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; border: none; }
        #msg { font-size: 12px; text-align: center; margin-top: 10px; color: var(--primary); }
        
        #previewBox { margin-top: 10px; display: none; text-align: center; border: 1px dashed var(--primary); padding: 5px; border-radius: 10px; }
        #imgPreview { width: 100%; border-radius: 5px; max-height: 120px; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo">আল নোমান শিকদার</div>
        <nav>
            <span style="cursor:pointer; margin-right:15px;" onclick="gsap.to(window, {scrollTo: '#flower-sec'})">ফুল</span>
            <span style="cursor:pointer; margin-right:15px;" onclick="gsap.to(window, {scrollTo: '#fruit-sec'})">ফল</span>
            <span style="cursor:pointer;" onclick="gsap.to(window, {scrollTo: '#nature-sec'})">ন্যাচার</span>
        </nav>
    </header>

    <!-- অ্যাডমিন সেকশন -->
    <div class="admin-nav">
        <button class="admin-toggle" onclick="toggleAdmin()">লগিন</button>
        
        <div class="glass-box" id="adminBox">
            <!-- লগিন এরিয়া -->
            <div id="authArea">
                <p style="text-align:center; font-weight:bold; margin-bottom:5px;">অ্যাডমিন লগিন</p>
                <input type="password" id="adminPassInput" placeholder="পাসওয়ার্ড লিখুন" onkeydown="if(event.key==='Enter') checkPass()">
                <button onclick="checkPass()" style="background:var(--primary); color:#000;">লগিন করুন</button>
            </div>

            <!-- আপলোড এরিয়া (শুরুতে লুকানো) -->
            <form id="uploadForm" style="display:none;">
                <p style="text-align:center; font-weight:bold; color:var(--primary);">ছবি আপলোড</p>
                <input type="file" id="fileInp" accept="image/*" required>
                <div id="previewBox">
                    <img id="imgPreview" src="">
                </div>
                <select id="fileCat">
                    <option value="ফুল">ফুল (Flower)</option>
                    <option value="ফল">ফল (Fruit)</option>
                    <option value="ন্যাচার">ন্যাচার (Nature)</option>
                </select>
                <button type="submit" class="up-btn" id="subBtn">ড্রাইভে পাঠান</button>
            </form>
            <p id="msg"></p>
        </div>
    </div>

    <!-- সেকশন গুলো -->
    <section id="flower-sec">
        <div class="sec-bg">FLOWERS</div>
        <div class="slider-viewport"><div class="drum" id="flower-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('flower', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('flower', -1)">→</div>
        </div>
    </section>

    <section id="fruit-sec">
        <div class="sec-bg">FRUITS</div>
        <div class="slider-viewport"><div class="drum" id="fruit-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('fruit', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('fruit', -1)">→</div>
        </div>
    </section>

    <section id="nature-sec">
        <div class="sec-bg">NATURE</div>
        <div class="slider-viewport"><div class="drum" id="nature-drum"></div></div>
        <div class="controls">
            <div class="btn-slide" onclick="rotateDrum('nature', 1)">←</div>
            <div class="btn-slide" onclick="rotateDrum('nature', -1)">→</div>
        </div>
    </section>

    <script>
        const GALLERY_API_URL = "/api/gallery";
        const rotLog = { flower: 0, fruit: 0, nature: 0 };

        // ১. লগিন বক্স দেখানো/লুকানো
        function toggleAdmin() {
            const adminBox = document.getElementById('adminBox');
            // যদি বক্সটি লুকানো থাকে তবে দেখাবে, নয়তো লুকাবে
            if (adminBox.style.display === "none" || adminBox.style.display === "") {
                adminBox.style.display = "block";
                gsap.from(adminBox, { opacity: 0, y: -20, duration: 0.4 });
            } else {
                adminBox.style.display = "none";
            }
        }

        // ২. পাসওয়ার্ড চেক (ব্যাকএন্ডের সাথে মিল রেখে)
        async function checkPass() {
            const pass = document.getElementById('adminPassInput').value;
            const msg = document.getElementById('msg');
            
            if(!pass) return;
            msg.innerText = "যাচাই হচ্ছে...";

            try {
                // আপনার api/gallery.js এ GET রিকোয়েস্ট পাঠানো হচ্ছে লগিন চেক করার জন্য
                const res = await fetch(`${GALLERY_API_URL}?action=login&pass=${encodeURIComponent(pass)}`);
                const result = await res.json();

                if(res.ok && result.success) {
                    document.getElementById('authArea').style.display = 'none';
                    document.getElementById('uploadForm').style.display = 'block';
                    msg.innerText = "লগিন সফল!";
                    msg.style.color = "#00d2ff";
                } else {
                    msg.innerText = "ভুল পাসওয়ার্ড!";
                    msg.style.color = "#ff4d4d";
                    gsap.to("#adminBox", { x: 10, repeat: 3, yoyo: true, duration: 0.05 });
                }
            } catch (err) {
                msg.innerText = "সার্ভার এরর!";
            }
        }

        // ৩. ফটো প্রিভিউ
        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imgPreview').src = ev.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // ৪. আপলোড লজিক
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msg = document.getElementById('msg');
            const file = document.getElementById('fileInp').files[0];

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const res = await fetch(GALLERY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fileData: reader.result,
                            filename: file.name,
                            category: document.getElementById('fileCat').value
                        })
                    });
                    if(res.ok) {
                        msg.innerText = "সফলভাবে আপলোড হয়েছে!";
                        document.getElementById('uploadForm').reset();
                        document.getElementById('previewBox').style.display = 'none';
                        setTimeout(() => location.reload(), 1500); // রিফ্রেশ
                    }
                } catch (err) { msg.innerText = "ব্যর্থ হয়েছে!"; }
                btn.disabled = false;
                btn.innerText = "ড্রাইভে পাঠান";
            };
        };

        // ৫. গ্যালারি ডাটা লোড ও ড্রাম রোটেশন (পূর্বের মতই)
        async function loadGallery() {
            try {
                const res = await fetch(GALLERY_API_URL);
                const data = await res.json();
                renderCategory('flower', data.filter(i => i.category === 'ফুল'));
                renderCategory('fruit', data.filter(i => i.category === 'ফল'));
                renderCategory('nature', data.filter(i => i.category === 'ন্যাচার'));
            } catch (e) { console.log("Load error"); }
        }

        function renderCategory(cat, images) {
            const container = document.getElementById(`${cat}-drum`);
            if(!images.length) return;
            container.innerHTML = images.map(img => `<div class="card"><img src="${img.url}"></div>`).join('');
            rotateDrum(cat, 0);
        }

        function rotateDrum(cat, dir) {
            const drum = document.getElementById(`${cat}-drum`);
            const cards = drum.querySelectorAll('.card');
            if(!cards.length) return;
            const step = 360 / cards.length;
            rotLog[cat] += step * dir;
            cards.forEach((card, i) => {
                const angle = (i * step) + rotLog[cat];
                const rad = angle * Math.PI / 180;
                gsap.to(card, {
                    x: Math.sin(rad) * 450,
                    z: Math.cos(rad) * 450,
                    rotationY: angle,
                    duration: 1.2,
                    ease: "power2.out"
                });
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
