<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফটো গ্যালারি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #00ff88;
            --bg: #050505;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
            --neon-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-shadow: var(--neon-shadow); }

        /* স্লাইডার সেকশন */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sec-bg { font-size: 10rem; opacity: 0.02; position: absolute; pointer-events: none; font-weight: 900; text-transform: uppercase; letter-spacing: 20px; }

        .slider-viewport { height: 450px; width: 100%; perspective: 2000px; display: flex; justify-content: center; align-items: center; }
        .drum { position: relative; width: 250px; height: 350px; transform-style: preserve-3d; }
        
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 20px; 
            overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); backface-visibility: hidden;
            transition: transform 0.5s; cursor: pointer;
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 210, 255, 0.3); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { scale: 1.1; }
        
        .card-caption {
            position: absolute; bottom: 0; width: 100%; padding: 20px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            color: #fff; font-size: 14px; text-align: center; font-weight: 500;
        }

        .comment-trigger {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            padding: 5px 10px; border-radius: 15px; font-size: 11px; border: 1px solid var(--primary);
            color: var(--primary); opacity: 0; transition: 0.3s;
        }
        .card:hover .comment-trigger { opacity: 1; }

        .controls { display: flex; gap: 30px; margin-top: 50px; z-index: 10; }
        .btn-slide { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: var(--glass); color: var(--primary); 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; border: 1px solid var(--primary); 
            transition: 0.4s; font-size: 20px;
        }
        .btn-slide:hover { background: var(--primary); color: #000; box-shadow: var(--neon-shadow); transform: scale(1.1); }

        /* অ্যাডমিন প্যানেল */
        .admin-nav { position: fixed; top: 80px; right: 20px; z-index: 1100; }
        .admin-toggle { 
            background: rgba(0, 210, 255, 0.1); color: var(--primary); 
            border: 1px solid var(--primary); padding: 10px 22px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .glass-box {
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(30px);
            padding: 30px; border-radius: 25px; border: 1px solid var(--border);
            width: 350px; position: absolute; right: 0; top: 60px;
            display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            max-height: 80vh; overflow-y: auto;
        }
        
        .upload-form-ui { display: flex; flex-direction: column; gap: 15px; }
        input, select, textarea, button { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--glass); 
            color: #fff; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        
        .up-btn { background: var(--primary); color: #000; font-weight: 700; cursor: pointer; border: none; margin-top: 5px; }
        .up-btn:hover { background: #fff; transform: translateY(-2px); }

        /* কমেন্ট সেকশন ডিজাইন */
        #adminComments { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .comment-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
        .comment-item small { color: var(--primary); display: block; margin-bottom: 4px; font-size: 11px; }
        .comment-item p { font-size: 13px; color: #ddd; }

        /* কমেন্ট মোডাল */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }
        .modal-content {
            background: #111; padding: 30px; border-radius: 25px;
            width: 100%; max-width: 400px; border: 1px solid var(--primary);
            box-shadow: var(--neon-shadow);
        }

        #msg { font-size: 13px; text-align: center; margin-top: 10px; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">আল নোমান শিকদার</div>
        <nav>
            <span style="cursor:pointer; margin-right:15px; font-weight:500;" onclick="gsap.to(window, {scrollTo: '#self-sec'})">নিজ</span>
            <span style="cursor:pointer; margin-right:15px; font-weight:500;" onclick="gsap.to(window, {scrollTo: '#flower-sec'})">ফুল</span>
            <span style="cursor:pointer; font-weight:500;" onclick="gsap.to(window, {scrollTo: '#nature-sec'})">প্রকৃতি</span>
        </nav>
    </header>

    <!-- অ্যাডমিন সেকশন -->
    <div class="admin-nav">
        <button class="admin-toggle" id="adminBtn" onclick="toggleAdmin()">লগিন</button>
        
        <div class="glass-box" id="adminBox">
            <div id="authArea">
                <p style="text-align:center; font-weight:bold; margin-bottom:15px;">অ্যাডমিন এক্সেস</p>
                <input type="password" id="adminPassInput" placeholder="পাসওয়ার্ড...">
                <button onclick="checkPass()" style="background:var(--primary); color:#000; margin-top:10px;">ভেরিফাই</button>
            </div>

            <form id="uploadForm" class="upload-form-ui" style="display:none;">
                <p style="text-align:center; font-weight:bold; color:var(--primary);">নতুন ফটো আপলোড</p>
                <input type="file" id="fileInp" accept="image/*" required>
                <div id="previewBox" style="display:none;"><img id="imgPreview" style="width:100%; border-radius:10px; margin-bottom:10px;"></div>
                <input type="text" id="fileCaption" placeholder="ছবির ক্যাপশন...">
                <select id="fileCat">
                    <option value="নিজ">নিজ</option>
                    <option value="ফুল">ফুল</option>
                    <option value="প্রকৃতি">প্রকৃতি</option>
                </select>
                <button type="submit" class="up-btn" id="subBtn">আপলোড করুন</button>
                
                <div id="adminComments">
                    <p style="font-size:14px; margin-bottom:10px; color:var(--secondary);">সাম্প্রতিক কমেন্টসমূহ:</p>
                    <div id="commentList">লোডিং...</div>
                </div>

                <button type="button" onclick="logout()" style="background:transparent; border-color:#ff4d4d; color:#ff4d4d; margin-top:10px;">লগআউট</button>
            </form>
            <p id="msg"></p>
        </div>
    </div>

    <!-- গ্যালারি সেকশন -->
    <section id="self-sec"><div class="sec-bg">PERSONAL</div><div class="slider-viewport"><div class="drum" id="self-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('self', 1)">←</div><div class="btn-slide" onclick="rotateDrum('self', -1)">→</div></div>
    </section>

    <section id="flower-sec"><div class="sec-bg">FLOWERS</div><div class="slider-viewport"><div class="drum" id="flower-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('flower', 1)">←</div><div class="btn-slide" onclick="rotateDrum('flower', -1)">→</div></div>
    </section>

    <section id="nature-sec"><div class="sec-bg">NATURE</div><div class="slider-viewport"><div class="drum" id="nature-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('nature', 1)">←</div><div class="btn-slide" onclick="rotateDrum('nature', -1)">→</div></div>
    </section>

    <!-- কমেন্ট মোডাল -->
    <div class="modal" id="commentModal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px; color:var(--primary);">মতামত দিন</h3>
            <p id="targetImgName" style="font-size:12px; margin-bottom:10px; opacity:0.7;"></p>
            <input type="text" id="visitorName" placeholder="আপনার নাম" style="margin-bottom:10px;">
            <textarea id="visitorText" placeholder="কমেন্ট লিখুন..." rows="3" style="margin-bottom:15px;"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="submitComment()" style="background:var(--primary); color:#000;">পাঠিয়ে দিন</button>
                <button onclick="closeModal()" style="background:rgba(255,255,255,0.1);">বাতিল</button>
            </div>
        </div>
    </div>

    <script>
        // আপনার গুগল অ্যাপস স্ক্রিপ্ট ইউআরএল এখানে দিন
        const GALLERY_API_URL = "/api/gallery"; 
        
        const rotLog = { self: 0, flower: 0, nature: 0 };
        let activeImgUrl = "";

        function toggleAdmin() {
            const box = document.getElementById('adminBox');
            box.style.display = (box.style.display === "block") ? "none" : "block";
            if(box.style.display === "block" && localStorage.getItem('nomans_auth')) loadAllComments();
        }

        async function checkPass() {
            const pass = document.getElementById('adminPassInput').value;
            if(!pass) return;
            try {
                const res = await fetch(`${GALLERY_API_URL}?action=login&pass=${encodeURIComponent(pass)}`);
                const result = await res.json();
                if(result.success) {
                    localStorage.setItem('nomans_auth', 'true');
                    showUploadForm();
                    loadAllComments();
                } else { alert("ভুল পাসওয়ার্ড!"); }
            } catch (e) { alert("সার্ভার কানেকশন এরর!"); }
        }

        function showUploadForm() {
            document.getElementById('authArea').style.display = 'none';
            document.getElementById('uploadForm').style.display = 'flex';
            document.getElementById('adminBtn').innerText = "অ্যাডমিন প্যানেল";
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // কমেন্ট হ্যান্ডলিং
        function openCommentModal(url, caption) {
            activeImgUrl = url;
            document.getElementById('targetImgName').innerText = "ছবি: " + (caption || "শিরোনামহীন");
            document.getElementById('commentModal').style.display = "flex";
            gsap.from(".modal-content", {scale: 0.8, opacity: 0, duration: 0.3});
        }

        function closeModal() { document.getElementById('commentModal').style.display = "none"; }

        async function submitComment() {
            const name = document.getElementById('visitorName').value;
            const text = document.getElementById('visitorText').value;
            if(!name || !text) return alert("সব ঘর পূরণ করুন");

            try {
                const res = await fetch(GALLERY_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'addComment',
                        imgUrl: activeImgUrl,
                        visitor: name,
                        comment: text
                    })
                });
                if(res.ok) {
                    alert("কমেন্ট সফলভাবে জমা হয়েছে!");
                    closeModal();
                    document.getElementById('visitorText').value = "";
                }
            } catch (e) { alert("ব্যর্থ হয়েছে!"); }
        }

        async function loadAllComments() {
            const list = document.getElementById('commentList');
            try {
                const res = await fetch(`${GALLERY_API_URL}?action=getComments`);
                const data = await res.json();
                list.innerHTML = data.reverse().map(c => `
                    <div class="comment-item">
                        <small>${c.visitor} (${c.date})</small>
                        <p>${c.comment}</p>
                    </div>
                `).join('');
            } catch (e) { list.innerText = "কমেন্ট লোড করা যায়নি।"; }
        }

        // গ্যালারি ফাংশনালিটি
        async function loadGallery() {
            try {
                const res = await fetch(GALLERY_API_URL);
                const data = await res.json();
                renderCategory('self', data.filter(i => i.category === 'নিজ'));
                renderCategory('flower', data.filter(i => i.category === 'ফুল'));
                renderCategory('nature', data.filter(i => i.category === 'প্রকৃতি'));
            } catch (e) { console.log("Load error"); }
        }

        function renderCategory(cat, images) {
            const drum = document.getElementById(`${cat}-drum`);
            if(!images.length) { drum.innerHTML = "<p style='font-size:12px;opacity:0.5;'>ছবি নেই</p>"; return; }
            
            drum.innerHTML = images.map(img => `
                <div class="card" onclick="openCommentModal('${img.url}', '${img.caption}')">
                    <img src="${img.url}">
                    <div class="comment-trigger">কমেন্ট করুন</div>
                    ${img.caption ? `<div class="card-caption">${img.caption}</div>` : ''}
                </div>
            `).join('');
            rotateDrum(cat, 0);
        }

        function rotateDrum(cat, dir) {
            const drum = document.getElementById(`${cat}-drum`);
            const cards = drum.querySelectorAll('.card');
            if(!cards.length) return;
            const step = 360 / cards.length;
            rotLog[cat] += step * dir;
            cards.forEach((card, i) => {
                const angle = (i * step) + rotLog[cat];
                const rad = angle * Math.PI / 180;
                gsap.to(card, {
                    x: Math.sin(rad) * 450,
                    z: Math.cos(rad) * 450,
                    rotationY: angle,
                    duration: 1.5,
                    ease: "power3.out"
                });
            });
        }

        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imgPreview').src = ev.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const file = document.getElementById('fileInp').files[0];
            btn.disabled = true; btn.innerText = "আপলোড হচ্ছে...";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    await fetch(GALLERY_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            fileData: reader.result,
                            filename: file.name,
                            caption: document.getElementById('fileCaption').value,
                            category: document.getElementById('fileCat').value
                        })
                    });
                    location.reload();
                } catch (err) { alert("ব্যর্থ!"); btn.disabled = false; }
            };
        };

        window.onload = () => {
            loadGallery();
            if(localStorage.getItem('nomans_auth')) showUploadForm();
        };
    </script>
</body>
</html>
