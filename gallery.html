<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আল নোমান শিকদার - প্রিমিয়াম ৩ডি গ্যালারি</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --bg: #030508;
            --card-w: 220px;
            --card-h: 300px;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; padding-bottom: 100px; }

        /* হেডার */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 30px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        .admin-btn { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 14px; }

        /* সেকশন লেআউট */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-bottom: 1px solid rgba(255,255,255,0.03); overflow: hidden; }
        
        .sec-title { position: absolute; top: 100px; left: 30px; z-index: 10; }
        .sec-title h2 { font-size: 32px; margin-bottom: 5px; }
        .sec-title .line { width: 50px; height: 3px; background: var(--primary); margin-bottom: 10px; }
        .view-all-btn { color: var(--primary); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .view-all-btn:hover { text-decoration: underline; }

        /* ৩ডি ভিউপোর্ট এবং ড্রাম */
        .viewport { 
            width: 100%; height: 400px; 
            display: flex; justify-content: center; align-items: center; 
            perspective: 2000px; 
        }

        .drum { 
            position: relative; width: var(--card-w); height: var(--card-h); 
            transform-style: preserve-3d; 
            will-change: transform;
        }
        
        .card { 
            position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 15px; 
            overflow: hidden; border: 1px solid var(--border); 
            background: #111; backface-visibility: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .card:hover img { transform: scale(1.05); }

        .card-caption { 
            position: absolute; bottom: 0; width: 100%; padding: 10px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            text-align: center; font-size: 12px; 
        }

        /* নেভিগেশন কন্ট্রোল */
        .controls { display: flex; gap: 30px; margin-top: 40px; z-index: 10; }
        .c-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-size: 20px; transition: 0.3s; 
        }
        .c-btn:hover { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }

        /* বটম ট্যাব বার */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 65px; background: rgba(20, 25, 30, 0.85); 
            backdrop-filter: blur(25px); border-radius: 50px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; opacity: 0.5; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-item .icon { font-size: 20px; margin-bottom: 2px; }

        /* গ্রিড ভিউ (View All) */
        .grid-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; }
        .grid-card { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111; cursor: pointer; transition: 0.3s; }
        .grid-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .grid-card img { width: 100%; height: auto; display: block; object-fit: contain; } /* ছবি ছোট দেখাবে না */
        .close-grid { position: fixed; top: 20px; right: 20px; background: var(--primary); color: #000; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 2100; }

        /* লাইটবক্স (বড় ছবি প্রিভিউ) */
        .lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 3000; backdrop-filter: blur(10px); cursor: zoom-out;
        }
        .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 2px solid var(--border); }
        .lightbox-caption { position: absolute; bottom: 30px; color: #fff; font-size: 18px; text-align: center; width: 100%; text-shadow: 0 2px 10px #000; }

        /* এডমিন প্যানেল */
        .admin-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0d1117; padding: 30px; border-radius: 30px 30px 0 0; z-index: 2500; transition: 0.5s; box-shadow: 0 -10px 50px rgba(0,0,0,0.5); }
        .admin-panel.open { bottom: 0; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; }
        .up-btn { background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">নোমান শিকদার</div>
        <div class="admin-btn" onclick="openAdmin()">অ্যাডমিন</div>
    </header>

    <!-- সেকশন ১: নিজ -->
    <section id="sec-self">
        <div class="sec-title">
            <h2>নিজ</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('নিজ')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-self"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('self', 1)">←</div>
            <div class="c-btn" onclick="rotate('self', -1)">→</div>
        </div>
    </section>

    <!-- সেকশন ২: ফুল -->
    <section id="sec-flower">
        <div class="sec-title">
            <h2>ফুল</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('ফুল')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-flower"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('flower', 1)">←</div>
            <div class="c-btn" onclick="rotate('flower', -1)">→</div>
        </div>
    </section>

    <!-- সেকশন ৩: ন্যাচার -->
    <section id="sec-nature">
        <div class="sec-title">
            <h2>ন্যাচার</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('ন্যাচার')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-nature"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('nature', 1)">←</div>
            <div class="c-btn" onclick="rotate('nature', -1)">→</div>
        </div>
    </section>

    <!-- গ্রিড ভিউ ওভারলে -->
    <div class="grid-overlay" id="gridOverlay">
        <div class="close-grid" onclick="closeGrid()">বন্ধ করুন</div>
        <h2 id="gridTitle" style="text-align: center; color: var(--primary);">অ্যালবাম</h2>
        <div class="grid-container" id="gridContainer"></div>
    </div>

    <!-- লাইটবক্স -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lbImg" src="">
        <div class="lightbox-caption" id="lbCap"></div>
    </div>

    <!-- বটম নেভিগেশন বার -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="navTo('sec-self')"><span class="icon">🏠</span><span>নিজ</span></div>
        <div class="nav-item" onclick="navTo('sec-flower')"><span class="icon">🌸</span><span>ফুল</span></div>
        <div class="nav-item" onclick="navTo('sec-nature')"><span class="icon">🌿</span><span>ন্যাচার</span></div>
    </div>

    <!-- এডমিন মোডাল -->
    <div class="admin-panel" id="adminPanel">
        <div id="loginBox">
            <h3>অ্যাডমিন লগিন</h3>
            <input type="password" id="adminPass" placeholder="পাসওয়ার্ড...">
            <button class="up-btn" onclick="login()">লগিন করুন</button>
            <button onclick="closeAdmin()" style="background:none">বন্ধ করুন</button>
        </div>
        <div id="uploadBox" style="display:none">
            <h3 style="color:var(--primary)">নতুন ফটো আপলোড</h3>
            <input type="file" id="fInp" accept="image/*">
            <input type="text" id="cInp" placeholder="ক্যাপশন...">
            <select id="catInp">
                <option value="নিজ">নিজ</option>
                <option value="ফুল">ফুল</option>
                <option value="ন্যাচার">ন্যাচার</option>
            </select>
            <button class="up-btn" id="upBtn" onclick="upload()">আপলোড</button>
            <button onclick="logout()" style="color:#ff4d4d">লগআউট</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollToPlugin);
        const API_URL = "/api/gallery"; 
        let galleryData = [];
        const rotLog = { self: 0, flower: 0, nature: 0 };

        // ১. ডাটা লোড ও ড্রাম রেন্ডার
        async function load() {
            try {
                const res = await fetch(API_URL);
                galleryData = await res.json();
                
                renderDrum('নিজ', 'self');
                renderDrum('ফুল', 'flower');
                renderDrum('ন্যাচার', 'nature');
            } catch (e) { console.error("Load failed"); }
        }

        function renderDrum(catName, targetId) {
            const drum = document.getElementById('drum-' + targetId);
            const items = galleryData.filter(d => d.category === catName);
            
            if(!items.length) {
                drum.innerHTML = `<p style="opacity:0.3; font-size:12px; width:200px; text-align:center;">ফটো নেই</p>`;
                return;
            }

            const count = items.length;
            const radius = Math.round( (220 / 2) / Math.tan( Math.PI / count ) ) + 60;

            drum.innerHTML = items.map((img, i) => {
                const angle = i * (360 / count);
                return `
                    <div class="card" style="transform: rotateY(${angle}deg) translateZ(${radius}px)" onclick="openLightbox('${img.url}', '${img.caption || ''}')">
                        <img src="${img.url}">
                        <div class="card-caption">${img.caption || '...'}</div>
                    </div>
                `;
            }).join('');
        }

        // ২. রোটেশন লজিক
        function rotate(id, dir) {
            const drum = document.getElementById('drum-' + id);
            const cat = (id === 'self' ? 'নিজ' : id === 'flower' ? 'ফুল' : 'ন্যাচার');
            const count = galleryData.filter(d => d.category === cat).length;
            if(count < 1) return;

            rotLog[id] += (360 / count) * dir;
            gsap.to(drum, { rotationY: rotLog[id], duration: 1.2, ease: "power3.out" });
        }

        // ৩. বড় প্রিভিউ (Lightbox) লজিক
        function openLightbox(url, caption) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lbImg').src = url;
            document.getElementById('lbCap').innerText = caption;
            lb.style.display = 'flex';
            gsap.from("#lbImg", { scale: 0.8, opacity: 0, duration: 0.4, ease: "back.out(1.7)" });
        }
        function closeLightbox() {
            gsap.to("#lightbox", { opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('lightbox').style.display = 'none';
                document.getElementById('lightbox').style.opacity = '1';
            }});
        }

        // ৪. গ্রিড ভিউ (View All)
        function showGrid(cat) {
            const overlay = document.getElementById('gridOverlay');
            const container = document.getElementById('gridContainer');
            document.getElementById('gridTitle').innerText = cat + " অ্যালবাম";
            
            const filtered = galleryData.filter(d => d.category === cat);
            container.innerHTML = filtered.map(img => `
                <div class="grid-card" onclick="openLightbox('${img.url}', '${img.caption || ''}')">
                    <img src="${img.url}">
                    <p style="padding:10px; font-size:12px; text-align:center;">${img.caption || ''}</p>
                </div>
            `).join('');
            
            overlay.style.display = "block";
            gsap.from(overlay, {opacity: 0, y: 100, duration: 0.5});
        }
        function closeGrid() { document.getElementById('gridOverlay').style.display = "none"; }

        // ৫. নেভিগেশন ও এডমিন ফাংশন
        function navTo(id) {
            gsap.to(window, {scrollTo: {y: "#" + id, offsetY: 0}, duration: 1});
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function openAdmin() { document.getElementById('adminPanel').classList.add('open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('open'); }

        async function login() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(`${API_URL}?action=login&pass=${pass}`);
            const data = await res.json();
            if(data.success) { localStorage.setItem('noman_auth', '1'); checkAuth(); } else { alert("ভুল পাসওয়ার্ড"); }
        }

        function checkAuth() {
            if(localStorage.getItem('noman_auth')) {
                document.getElementById('loginBox').style.display = "none";
                document.getElementById('uploadBox').style.display = "block";
            }
        }

        function logout() { localStorage.removeItem('noman_auth'); location.reload(); }

        async function upload() {
            const file = document.getElementById('fInp').files[0];
            const btn = document.getElementById('upBtn');
            if(!file) return alert("ফাইল বাছুন");
            
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: reader.result,
                        filename: file.name,
                        caption: document.getElementById('cInp').value,
                        category: document.getElementById('catInp').value
                    })
                });
                location.reload();
            };
        }

        window.onload = () => { load(); checkAuth(); };
    </script>
</body>
</html>
