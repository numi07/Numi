<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্যালারি অ্যাপ - নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@300;600&display=swap');

        :root {
            --accent: #00d2ff;
            --secondary: #00ff88;
            --bg: #0b0e11;
            --card-bg: #161b22;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 80px; }

        /* নান্দনিক হেডার */
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(11, 14, 17, 0.8); backdrop-filter: blur(15px); z-index: 100;
        }
        .app-title { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .admin-trigger { background: var(--glass); border: 1px solid var(--border); padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 14px; }

        /* সেকশন হেডার */
        .section-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px;
        }
        .section-header h2 { font-size: 24px; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 15px; }
        .view-all { color: var(--accent); font-size: 14px; cursor: pointer; font-weight: 500; }

        /* ৩ডি ড্রাম এরিয়া */
        .viewport-wrapper { height: 400px; display: flex; justify-content: center; align-items: center; perspective: 1500px; overflow: hidden; }
        .drum { position: relative; width: 180px; height: 260px; transform-style: preserve-3d; transition: transform 0.1s; }
        
        .card { 
            position: absolute; width: 180px; height: 260px; border-radius: 15px; 
            overflow: hidden; border: 1px solid var(--border); background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); text-align: center; font-size: 12px; }

        /* কন্ট্রোল বাটন */
        .nav-btns { display: flex; justify-content: center; gap: 20px; margin-top: -20px; }
        .nav-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--glass); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--accent); }

        /* গ্রিড ভিউ (সব দেখুন) */
        .grid-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            padding: 20px; display: none; overflow-y: auto;
        }
        .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .grid-item { border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: var(--card-bg); }
        .grid-item img { width: 100%; height: 180px; object-fit: cover; }
        .grid-item p { padding: 10px; font-size: 12px; text-align: center; }

        /* মোবাইল নেভিগেশন বার */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 999;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* অ্যাডমিন প্যানেল */
        .admin-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; justify-content: center; align-items: flex-end;
        }
        .admin-content {
            background: var(--card-bg); width: 100%; max-width: 500px; 
            padding: 30px; border-radius: 30px 30px 0 0; border-top: 2px solid var(--accent);
        }
        .form-group { margin-bottom: 15px; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: #fff; outline: none; }
        .primary-btn { background: var(--accent); color: #000; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; }

        /* অ্যানিমেশন */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="app-title">নোমান শিকদার</div>
        <div class="admin-trigger" onclick="openAdmin()">অ্যাডমিন</div>
    </header>

    <!-- সেকশন ১: ব্যক্তিগত -->
    <div class="section-header">
        <h2>ব্যক্তিগত</h2>
        <div class="view-all" onclick="showGridView('নিজ')">সব দেখুন →</div>
    </div>
    <div class="viewport-wrapper">
        <div class="drum" id="drum-self"></div>
    </div>
    <div class="nav-btns">
        <div class="nav-btn" onclick="rotateDrum('self', 1)">←</div>
        <div class="nav-btn" onclick="rotateDrum('self', -1)">→</div>
    </div>

    <!-- সেকশন ২: ফুল -->
    <div class="section-header">
        <h2>ফুল</h2>
        <div class="view-all" onclick="showGridView('ফুল')">সব দেখুন →</div>
    </div>
    <div class="viewport-wrapper">
        <div class="drum" id="drum-flower"></div>
    </div>
    <div class="nav-btns">
        <div class="nav-btn" onclick="rotateDrum('flower', 1)">←</div>
        <div class="nav-btn" onclick="rotateDrum('flower', -1)">→</div>
    </div>

    <!-- সেকশন ৩: প্রকৃতি -->
    <div class="section-header">
        <h2>প্রকৃতি</h2>
        <div class="view-all" onclick="showGridView('প্রকৃতি')">সব দেখুন →</div>
    </div>
    <div class="viewport-wrapper">
        <div class="drum" id="drum-nature"></div>
    </div>
    <div class="nav-btns">
        <div class="nav-btn" onclick="rotateDrum('nature', 1)">←</div>
        <div class="nav-btn" onclick="rotateDrum('nature', -1)">→</div>
    </div>

    <!-- গ্রিড ভিউ ওভারলে -->
    <div class="grid-overlay" id="gridOverlay">
        <div class="grid-header">
            <h2 id="gridTitle">সব ছবি</h2>
            <div class="admin-trigger" onclick="closeGridView()">বন্ধ করুন</div>
        </div>
        <div class="grid-container" id="gridContainer"></div>
    </div>

    <!-- অ্যাডমিন মোডাল -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-content">
            <div id="loginArea">
                <h3 style="margin-bottom: 20px;">অ্যাডমিন লগিন</h3>
                <input type="password" id="adminPass" placeholder="পাসওয়ার্ড লিখুন..." style="margin-bottom: 15px;">
                <button class="primary-btn" onclick="handleLogin()">প্রবেশ করুন</button>
                <button onclick="closeAdmin()" style="margin-top:10px; background:none; border:none; font-size:12px;">বন্ধ করুন</button>
            </div>
            <div id="uploadArea" style="display: none;">
                <h3 style="margin-bottom: 20px; color: var(--accent);">নতুন ফটো যোগ করুন</h3>
                <input type="file" id="fileInp" accept="image/*" style="margin-bottom: 15px;">
                <input type="text" id="captionInp" placeholder="ছবির ক্যাপশন লিখুন..." style="margin-bottom: 15px;">
                <select id="catInp" style="margin-bottom: 15px;">
                    <option value="নিজ">নিজ</option>
                    <option value="ফুল">ফুল</option>
                    <option value="প্রকৃতি">প্রকৃতি</option>
                </select>
                <button class="primary-btn" id="upBtn" onclick="handleUpload()">সার্ভারে আপলোড করুন</button>
                <button onclick="handleLogout()" style="margin-top:15px; color: #ff4d4d; border: 1px solid #ff4d4d;">লগআউট</button>
            </div>
        </div>
    </div>

    <!-- বটম নেভিগেশন -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="gsap.to(window, {scrollTo: 0})">
            <span class="nav-icon">🏠</span>
            <span>হোম</span>
        </div>
        <div class="nav-item" onclick="gsap.to(window, {scrollTo: '#drum-self', offset: -100})">
            <span class="nav-icon">👤</span>
            <span>নিজ</span>
        </div>
        <div class="nav-item" onclick="gsap.to(window, {scrollTo: '#drum-flower', offset: -100})">
            <span class="nav-icon">🌸</span>
            <span>ফুল</span>
        </div>
        <div class="nav-item" onclick="gsap.to(window, {scrollTo: '#drum-nature', offset: -100})">
            <span class="nav-icon">🌿</span>
            <span>প্রকৃতি</span>
        </div>
    </div>

    <script>
        const API_URL = "/api/gallery"; // আপনার API URL এখানে বসান
        let galleryData = [];
        const rotation = { self: 0, flower: 0, nature: 0 };

        // ১. ডাটা লোড করা
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                galleryData = await res.json();
                renderAllDrums();
            } catch (e) { console.error("Data Load Error"); }
        }

        // ২. ৩ডি ড্রাম রেন্ডার
        function renderAllDrums() {
            const categories = ['নিজ', 'ফুল', 'প্রকৃতি'];
            const idMap = { 'নিজ': 'self', 'ফুল': 'flower', 'প্রকৃতি': 'nature' };
            
            categories.forEach(cat => {
                const drum = document.getElementById(`drum-${idMap[cat]}`);
                const images = galleryData.filter(d => d.category === cat);
                
                if(images.length === 0) {
                    drum.innerHTML = "<p style='font-size:12px;opacity:0.3;'>কোন ছবি নেই</p>";
                    return;
                }

                const radius = Math.round( (190 / 2) / Math.tan( Math.PI / images.length ) ) + 40;
                
                drum.innerHTML = images.map((img, i) => {
                    const angle = i * (360 / images.length);
                    return `
                        <div class="card" style="transform: rotateY(${angle}deg) translateZ(${radius}px)">
                            <img src="${img.url}">
                            <div class="card-info">${img.caption || 'নো ক্যাপশন'}</div>
                        </div>
                    `;
                }).join('');
            });
        }

        function rotateDrum(id, dir) {
            const drum = document.getElementById(`drum-${id}`);
            const count = galleryData.filter(d => d.category === (id === 'self' ? 'নিজ' : id === 'flower' ? 'ফুল' : 'প্রকৃতি')).length;
            if(count === 0) return;
            
            rotation[id] += (360 / count) * dir;
            gsap.to(drum, { rotationY: rotation[id], duration: 1, ease: "power2.out" });
        }

        // ৩. গ্রিড ভিউ (সব দেখুন)
        function showGridView(cat) {
            const overlay = document.getElementById('gridOverlay');
            const container = document.getElementById('gridContainer');
            const title = document.getElementById('gridTitle');
            
            title.innerText = cat + " - সব ছবি";
            const filtered = galleryData.filter(d => d.category === cat);
            
            container.innerHTML = filtered.map(img => `
                <div class="grid-item fade-in">
                    <img src="${img.url}">
                    <p>${img.caption || '...'}</p>
                </div>
            `).join('');
            
            overlay.style.display = "block";
            gsap.from(overlay, { y: '100%', duration: 0.5 });
        }

        function closeGridView() {
            gsap.to('#gridOverlay', { y: '100%', duration: 0.4, onComplete: () => {
                document.getElementById('gridOverlay').style.display = "none";
            }});
        }

        // ৪. অ্যাডমিন লজিক
        function openAdmin() {
            document.getElementById('adminModal').style.display = "flex";
            if(localStorage.getItem('admin_logged')) {
                document.getElementById('loginArea').style.display = "none";
                document.getElementById('uploadArea').style.display = "block";
            }
        }

        function closeAdmin() { document.getElementById('adminModal').style.display = "none"; }

        async function handleLogin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(`${API_URL}?action=login&pass=${pass}`);
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('admin_logged', 'true');
                document.getElementById('loginArea').style.display = "none";
                document.getElementById('uploadArea').style.display = "block";
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        function handleLogout() {
            localStorage.removeItem('admin_logged');
            location.reload();
        }

        async function handleUpload() {
            const file = document.getElementById('fileInp').files[0];
            const caption = document.getElementById('captionInp').value;
            const cat = document.getElementById('catInp').value;
            const btn = document.getElementById('upBtn');

            if(!file) return alert("ফাইল সিলেক্ট করুন");
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ fileData: reader.result, filename: file.name, caption: caption, category: cat })
                    });
                    alert("সফলভাবে আপলোড হয়েছে!");
                    location.reload();
                } catch (e) { alert("ব্যর্থ হয়েছে!"); btn.disabled = false; }
            };
        }

        window.onload = loadData;
    </script>
</body>
</html>
