<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্যালারি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00f0ff;
            --secondary: #ff0055;
            --bg: #05070a;
            --card-w: 220px;
            --card-h: 310px;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(15, 20, 25, 0.65);
            --glow: 0 0 20px rgba(0, 240, 255, 0.4);
            --text-color: #ffffff;
            --header-bg: rgba(5, 7, 10, 0.85);
        }

        body.bright-mode {
            --bg: #f0f2f5;
            --border: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1a1a1a;
            --header-bg: rgba(255, 255, 255, 0.9);
            --glow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: var(--text-color); overflow-x: hidden; scroll-behavior: smooth; padding-bottom: 100px; transition: background 0.4s, color 0.4s; }

        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(255, 0, 85, 0.05), transparent 50%);
            z-index: -1; animation: bgShift 15s infinite alternate linear;
        }
        @keyframes bgShift { 0% { transform: rotate(0deg); } 100% { transform: rotate(10deg); } }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 30px;
            background: var(--header-bg); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border); box-shadow: 0 4px 30px rgba(0,0,0,0.2);
        }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .admin-btn { background: transparent; color: var(--primary); padding: 6px 20px; border-radius: 30px; border: 1px solid var(--primary); font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.3s; box-shadow: var(--glow); }
        .admin-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-bottom: 1px solid rgba(255,255,255,0.02); overflow: hidden; }
        
        .sec-title { position: absolute; top: 100px; left: 30px; z-index: 10; }
        .sec-title h2 { font-size: 35px; margin-bottom: 5px; font-weight: 700; letter-spacing: 1px; color: var(--text-color); }
        .sec-title .line { width: 60px; height: 4px; background: linear-gradient(90deg, var(--primary), transparent); margin-bottom: 10px; border-radius: 5px; }
        .view-all-btn { color: var(--primary); cursor: pointer; font-size: 15px; transition: 0.3s; padding: 5px 15px; border: 1px solid var(--border); border-radius: 20px; display: inline-block; background: rgba(0,240,255,0.05); }
        .view-all-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .viewport { 
            width: 100%; height: 420px; 
            display: flex; justify-content: center; align-items: center; 
            perspective: 2500px; 
        }

        .drum { 
            position: relative; width: var(--card-w); height: var(--card-h); 
            transform-style: preserve-3d; 
            will-change: transform;
        }
        
        .card { 
            position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 20px; 
            overflow: hidden; border: 1px solid var(--border); 
            background: #0a0a0a; backface-visibility: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); cursor: pointer;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .card:hover { border-color: var(--primary); box-shadow: var(--glow); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.9; }
        .card:hover img { transform: scale(1.08); opacity: 1; }

        .card-caption { 
            position: absolute; bottom: 0; width: 100%; padding: 15px 10px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            text-align: center; font-size: 13px; font-weight: 500; color: #eee;
        }

        .controls { display: flex; gap: 40px; margin-top: 50px; z-index: 10; }
        .c-btn { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: var(--glass-bg); border: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; color: var(--primary);
            cursor: pointer; font-size: 22px; transition: 0.4s; backdrop-filter: blur(10px);
        }
        .c-btn:hover { background: var(--primary); color: #000; transform: scale(1.15); box-shadow: var(--glow); border-color: var(--primary); }

        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 340px; height: 70px; background: var(--glass-bg); 
            backdrop-filter: blur(25px); border-radius: 50px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; opacity: 0.5; cursor: pointer; transition: 0.4s; color: var(--text-color); }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-3px); }
        .nav-item .icon { font-size: 22px; margin-bottom: 2px; }

        .grid-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(15px); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .grid-card { border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: var(--glass-bg); cursor: pointer; transition: 0.4s; }
        .grid-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: var(--glow); }
        .grid-card img { width: 100%; height: 250px; display: block; object-fit: cover; } 
        .close-grid { position: fixed; top: 25px; right: 25px; background: var(--primary); color: #000; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; z-index: 2100; box-shadow: var(--glow); }

        .lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 3000; backdrop-filter: blur(20px); cursor: zoom-out;
        }
        .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid var(--border); }
        .lightbox-caption { position: absolute; bottom: 40px; color: #fff; font-size: 18px; text-align: center; width: 100%; text-shadow: 0 4px 15px #000; font-weight: 500; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 20px 0; }

        .admin-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--glass-bg); padding: 40px 30px; border-radius: 40px 40px 0 0; z-index: 2500; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -10px 50px rgba(0,0,0,0.8); border-top: 1px solid var(--primary); backdrop-filter: blur(25px); color: var(--text-color); }
        .admin-panel.open { bottom: 0; }
        
        #loginBox, #uploadBox { max-width: 400px; margin: 0 auto; text-align: center; }
        #loginBox h3 { font-size: 24px; color: var(--text-color); margin-bottom: 25px; font-weight: 700; letter-spacing: 1px; }
        #loginBox h3::after { content: '🔒'; margin-left: 10px; font-size: 20px; }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text-color); font-size: 15px; transition: 0.3s; outline: none; }
        input:focus, select:focus { border-color: var(--primary); background: rgba(0,240,255,0.05); }
        
        .up-btn { background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; padding: 15px; width: 100%; border-radius: 15px; font-size: 16px; transition: 0.3s; margin-bottom: 15px; }
        .up-btn:hover { background: #fff; box-shadow: var(--glow); transform: translateY(-2px); }
        .close-admin-btn { background: transparent; color: #888; border: 1px solid var(--border); padding: 10px; width: 100%; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .close-admin-btn:hover { color: var(--text-color); border-color: var(--text-color); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: 10px; }
        
        .card {
            -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0,0,0,0.5));
            transition: border 0.4s, box-shadow 0.4s, transform 0.4s;
        }
        .card:hover { transform: scale(1.05); z-index: 100; }
        .viewport { cursor: grab; }
        .viewport:active { cursor: grabbing; }

        .admin-action-btns { display: flex; gap: 8px; justify-content: center; padding: 0 10px 15px 10px; background: var(--glass-bg); border-top: 1px solid rgba(255,255,255,0.05); }
        .action-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-edit { background: rgba(0, 240, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 240, 255, 0.4); }
        .btn-del { background: rgba(255, 0, 85, 0.1); color: var(--secondary); border: 1px solid rgba(255, 0, 85, 0.4); }
        .btn-edit:hover { background: var(--primary); color: #000; box-shadow: var(--glow); }
        .btn-del:hover { background: var(--secondary); color: #fff; box-shadow: 0 0 15px var(--secondary); }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .logo { animation: float 4s ease-in-out infinite; }

        .admin-list-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .admin-list-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid var(--primary); }
        .admin-list-info { flex: 1; font-size: 14px; color: var(--text-color); }
        .admin-list-info span { font-size: 12px; color: #aaa; }
        .admin-list-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .admin-list-actions button { padding: 6px; font-size: 11px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-update-img { background: #00f0ff; color: #000; }
        .btn-edit-cap { background: #ffea00; color: #000; }
        .btn-del-cap { background: #ffaa00; color: #000; }
        .btn-del-photo { background: #ff0055; color: #fff; }
        .admin-list-actions button:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .close-panel-top { position: absolute; top: 20px; right: 25px; font-size: 26px; color: #ff0055; cursor: pointer; z-index: 3000; transition: 0.3s; }
        .close-panel-top:hover { transform: scale(1.2); text-shadow: 0 0 15px var(--secondary); }

        .logo { text-decoration: none !important; }
        .nav-home-btn { 
            text-decoration: none; 
            color: var(--text-color); 
            border: 1px solid var(--border); 
            padding: 6px 18px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 700; 
            transition: 0.3s; 
            background: rgba(255,255,255,0.03); 
        }
        .nav-home-btn:hover { 
            background: var(--primary); 
            color: #000; 
            box-shadow: var(--glow); 
            border-color: var(--primary); 
            transform: translateY(-2px);
        }
        .theme-ico { 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-color);
        }
        .theme-ico:hover { 
            transform: scale(1.1) rotate(15deg); 
            text-shadow: 0 0 10px var(--primary); 
            border-color: var(--primary);
            background: rgba(0, 240, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">আল নোমান শিকদার</a>
        <div class="admin-btn" onclick="openAdmin()">অ্যাডমিন প্যানেল</div>
    </header>
    <section id="sec-self">
        <div class="sec-title">
            <h2>নিজ</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('নিজ')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-self"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('self', 1)">←</div>
            <div class="c-btn" onclick="rotate('self', -1)">→</div>
        </div>
    </section>

    <section id="sec-flower">
        <div class="sec-title">
            <h2>ফুল</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('ফুল')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-flower"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('flower', 1)">←</div>
            <div class="c-btn" onclick="rotate('flower', -1)">→</div>
        </div>
    </section>
    
    <section id="sec-nature">
        <div class="sec-title">
            <h2>প্রকৃতি</h2>
            <div class="line"></div>
            <span class="view-all-btn" onclick="showGrid('ন্যাচার')">সব দেখুন →</span>
        </div>
        <div class="viewport"><div class="drum" id="drum-nature"></div></div>
        <div class="controls">
            <div class="c-btn" onclick="rotate('nature', 1)">←</div>
            <div class="c-btn" onclick="rotate('nature', -1)">→</div>
        </div>
    </section>

    <div class="grid-overlay" id="gridOverlay">
        <div class="close-grid" onclick="closeGrid()">বন্ধ করুন</div>
        <h2 id="gridTitle" style="text-align: center; color: var(--primary); font-size: 28px; margin-bottom: 10px;">অ্যালবাম</h2>
        <div class="grid-container" id="gridContainer"></div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lbImg" src="">
        <div class="lightbox-caption" id="lbCap"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navTo('sec-self')"><span class="icon">🏠</span><span>নিজ</span></div>
        <div class="nav-item" onclick="navTo('sec-flower')"><span class="icon">🌸</span><span>ফুল</span></div>
        <div class="nav-item" onclick="navTo('sec-nature')"><span class="icon">🌿</span><span>প্রকৃতি</span></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="close-panel-top" onclick="closeAdmin()">✖</div>

        <div id="loginBox">
            <h3>সিস্টেম লগিন</h3>
            <input type="password" id="adminPass" placeholder="আপনার সিক্রেট পাসওয়ার্ড দিন...">
            <button class="up-btn" onclick="login()">অ্যাক্সেস করুন</button>
            <button class="close-admin-btn" onclick="closeAdmin()">বন্ধ করুন</button>
        </div>
        <div id="uploadBox" style="display:none">
            <h3 style="color:var(--primary); margin-bottom: 20px;">নতুন ফটো আপলোড 🚀</h3>
            <input type="file" id="fInp" accept="image/*">
            <input type="text" id="cInp" placeholder="ছবির সুন্দর একটি ক্যাপশন দিন...">
            <select id="catInp">
                <option value="নিজ">অ্যালবাম: নিজ</option>
                <option value="ফুল">অ্যালবাম: ফুল</option>
                <option value="ন্যাচার">অ্যালবাম: প্রকৃতি</option>
            </select>
            <button class="up-btn" id="upBtn" onclick="upload()">সার্ভারে আপলোড করুন</button>
            
            <button class="up-btn" style="background:var(--secondary); color:#fff; box-shadow: 0 0 15px rgba(255,0,85,0.4);" onclick="showManageBox()">⚙️ ফটো ও ক্যাপশন ম্যানেজ করুন</button>

            <button class="close-admin-btn" onclick="closeAdmin()">প্যানেল বন্ধ করুন</button>
            <button class="close-admin-btn" onclick="logout()" style="color:#ff0055; border-color: rgba(255,0,85,0.3);">লগআউট করুন</button>
        </div>
        
        <div id="manageBox" style="display:none; width:100%; max-width:500px; margin:0 auto; text-align:center;">
            <h3 style="color:var(--primary); margin-bottom: 20px;">গ্যালারি ম্যানেজমেন্ট ⚙️</h3>
            <div id="adminPhotoList" style="max-height: 45vh; overflow-y: auto; text-align: left; margin-bottom:20px; padding-right:10px;"></div>
            <button class="up-btn" onclick="hideManageBox()">🔙 আপলোডে ফিরে যান</button>
            
            <button class="close-admin-btn" onclick="closeAdmin()">প্যানেল বন্ধ করুন</button>
            <button class="close-admin-btn" onclick="logout()" style="color:#ff0055; border-color: rgba(255,0,85,0.3);">লগআউট করুন</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollToPlugin);
        const API_URL = "/api/gallery"; 
        let galleryData =[];
        const rotLog = { self: 0, flower: 0, nature: 0 };

        async function load() {
            try {
                const res = await fetch(API_URL);
                galleryData = await res.json();
                
                renderDrum('নিজ', 'self');
                renderDrum('ফুল', 'flower');
                renderDrum('প্রকৃতি', 'nature');
            } catch (e) { console.error("Load failed"); }
        }

        function renderDrum(catName, targetId) {
            const drum = document.getElementById('drum-' + targetId);
            const items = galleryData.filter(d => d.category === catName);
            
            if(!items.length) {
                drum.innerHTML = `<p style="opacity:0.3; font-size:12px; width:200px; text-align:center;">ফটো নেই</p>`;
                return;
            }

            const count = items.length;
            let radius = 0;
            if (count > 1) {
                radius = Math.round( (220 / 2) / Math.tan( Math.PI / count ) ) + 60;
            }

            drum.innerHTML = items.map((img, i) => {
                const angle = i * (360 / count);
                return `
                    <div class="card" style="transform: rotateY(${angle}deg) translateZ(${radius}px)" onclick="openLightbox('${img.url}', '${img.caption || ''}')">
                        <img src="${img.url}">
                        <div class="card-caption">${img.caption || '...'}</div>
                    </div>
                `;
            }).join('');
        }

        function rotate(id, dir) {
            const drum = document.getElementById('drum-' + id);
            const cat = (id === 'self' ? 'নিজ' : id === 'flower' ? 'ফুল' : 'প্রকৃতি');
            const items = galleryData.filter(d => d.category === cat);
            if(items.length < 2) return;

            rotLog[id] += (360 / items.length) * dir;
            gsap.to(drum, { rotationY: rotLog[id], duration: 1.2, ease: "power3.out" });
        }

        function openLightbox(url, caption) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lbImg').src = url;
            document.getElementById('lbCap').innerText = caption;
            lb.style.display = 'flex';
            gsap.from("#lbImg", { scale: 0.8, opacity: 0, duration: 0.4, ease: "back.out(1.7)" });
        }
        function closeLightbox() {
            gsap.to("#lightbox", { opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('lightbox').style.display = 'none';
                document.getElementById('lightbox').style.opacity = '1';
            }});
        }

        function showGrid(cat) {
            const overlay = document.getElementById('gridOverlay');
            const container = document.getElementById('gridContainer');
            document.getElementById('gridTitle').innerText = cat + " অ্যালবাম";
            const filtered = galleryData.filter(d => d.category === cat);
            
            const isAdmin = localStorage.getItem('noman_auth');

            container.innerHTML = filtered.map(img => `
                <div class="grid-card">
                    <img src="${img.url}" onclick="openLightbox('${img.url}', '${img.caption || ''}')">
                    <p style="padding:15px 10px; font-size:14px; text-align:center; color:var(--text-color);">${img.caption || '...'}</p>
                    ${isAdmin ? `
                    <div class="admin-action-btns">
                        <button class="action-btn btn-edit" onclick="editPhotoCap('${img.url}', '${img.caption || ''}')">✏️ এডিট</button>
                        <button class="action-btn btn-del" onclick="deletePhotoRecord('${img.url}')">🗑️ ডিলিট</button>
                    </div>
                    ` : ''}
                </div>
            `).join('');
            overlay.style.display = "block";
            gsap.from(overlay, {opacity: 0, y: 100, duration: 0.5, ease: "power3.out"});
        };
        
        function closeGrid() { document.getElementById('gridOverlay').style.display = "none"; }

        function navTo(id) {
            gsap.to(window, {scrollTo: {y: "#" + id, offsetY: 0}, duration: 1});
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function openAdmin() { document.getElementById('adminPanel').classList.add('open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('open'); }

        async function login() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(`${API_URL}?action=login&pass=${pass}`);
            const data = await res.json();
            if(data.success) { localStorage.setItem('noman_auth', '1'); checkAuth(); } else { alert("ভুল পাসওয়ার্ড"); }
        }

        function checkAuth() {
            if(localStorage.getItem('noman_auth')) {
                document.getElementById('loginBox').style.display = "none";
                document.getElementById('uploadBox').style.display = "block";
            }
        }

        function logout() { localStorage.removeItem('noman_auth'); location.reload(); }

        async function upload() {
            const file = document.getElementById('fInp').files[0];
            const btn = document.getElementById('upBtn');
            if(!file) return alert("ফাইল বাছুন");
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileData: reader.result,
                        filename: file.name,
                        caption: document.getElementById('cInp').value,
                        category: document.getElementById('catInp').value
                    })
                });
                location.reload();
            };
        }

        window.onload = () => { load(); checkAuth(); };
 
        let carouselInterval = setInterval(() => {
            rotate('self', -1); rotate('flower', -1); rotate('nature', -1);
        }, 3000);

        let isDragging = false, startX = 0, currentId = '';
        document.querySelectorAll('.viewport').forEach(vp => {
            vp.addEventListener('mouseenter', () => clearInterval(carouselInterval));
            vp.addEventListener('mouseleave', () => {
                carouselInterval = setInterval(() => { rotate('self', -1); rotate('flower', -1); rotate('nature', -1); }, 3000);
            });
            
            vp.addEventListener('mousedown', (e) => {
                isDragging = true; startX = e.clientX;
                currentId = vp.querySelector('.drum').id.replace('drum-', '');
            });
            vp.addEventListener('mouseup', (e) => {
                if(!isDragging) return;
                isDragging = false;
                let diff = e.clientX - startX;
                if(diff > 50) rotate(currentId, 1);
                else if(diff < -50) rotate(currentId, -1);
            });

            vp.addEventListener('touchstart', (e) => {
                clearInterval(carouselInterval);
                isDragging = true; startX = e.touches[0].clientX;
                currentId = vp.querySelector('.drum').id.replace('drum-', '');
            });
            vp.addEventListener('touchend', (e) => {
                if(!isDragging) return;
                isDragging = false;
                let diff = e.changedTouches[0].clientX - startX;
                if(diff > 40) rotate(currentId, 1);
                else if(diff < -40) rotate(currentId, -1);
                carouselInterval = setInterval(() => { rotate('self', -1); rotate('flower', -1); rotate('nature', -1); }, 3000);
            });
        });

        function showManageBox() {
            document.getElementById('uploadBox').style.display = 'none';
            document.getElementById('manageBox').style.display = 'block';
            renderAdminList();
        }
        function hideManageBox() {
            document.getElementById('manageBox').style.display = 'none';
            document.getElementById('uploadBox').style.display = 'block';
        }

        function renderAdminList() {
            const list = document.getElementById('adminPhotoList');
            if(!galleryData.length) {
                list.innerHTML = "<p style='text-align:center; color:#888;'>কোনো ফটো নেই</p>"; return;
            }
            list.innerHTML = galleryData.map(img => `
                <div class="admin-list-item">
                    <img src="${img.url}">
                    <div class="admin-list-info">
                        <strong>অ্যালবাম: ${img.category}</strong><br>
                        <span>${img.caption || 'কোনো ক্যাপশন নেই'}</span>
                    </div>
                    <div class="admin-list-actions">
                        <button class="btn-update-img" onclick="updatePhotoFile('${img.url}')">🖼️ ছবি বদল</button>
                        <button class="btn-edit-cap" onclick="editPhotoCap('${img.url}', '${img.caption || ''}')">✏️ ক্যাপশন এডিট</button>
                        <button class="btn-del-cap" onclick="deleteCaption('${img.url}')">🚫 ক্যাপশন ডিলিট</button>
                        <button class="btn-del-photo" onclick="deletePhotoRecord('${img.url}')">🗑️ ছবি ডিলিট</button>
                    </div>
                </div>
            `).join('');
        }

        async function updatePhotoFile(imgUrl) {
            const fileInp = document.createElement('input');
            fileInp.type = 'file'; fileInp.accept = 'image/*';
            fileInp.onchange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const img = galleryData.find(d => d.url === imgUrl);
                    if(img) img.url = reader.result;
                    try {
                        await fetch(API_URL, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'updateImage', url: imgUrl, newFileData: reader.result })
                        });
                    } catch(err) {}
                    alert("ছবি সফলভাবে পরিবর্তন করা হয়েছে!");
                    renderAdminList(); renderDrum('নিজ', 'self'); renderDrum('ফুল', 'flower'); renderDrum('প্রকৃতি', 'nature');
                    if(document.getElementById('gridOverlay').style.display === 'block') closeGrid();
                }
            };
            fileInp.click();
        }

        async function editPhotoCap(imgUrl, oldCap) {
            const newCap = prompt("নতুন ক্যাপশন লিখুন:", oldCap);
            if (newCap !== null && newCap !== oldCap) {
                const img = galleryData.find(d => d.url === imgUrl);
                if(img) img.caption = newCap;
                try {
                    await fetch(API_URL, {
                        method: 'PUT', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'edit', url: imgUrl, caption: newCap })
                    });
                } catch(e) { console.log("API Error"); }
                
                alert("ক্যাপশন সফলভাবে পরিবর্তন করা হয়েছে!");
                renderDrum('নিজ', 'self'); renderDrum('ফুল', 'flower'); renderDrum('প্রকৃতি', 'nature');
                if(document.getElementById('manageBox').style.display === 'block') renderAdminList();
                if(document.getElementById('gridOverlay').style.display === 'block') closeGrid();
            }
        }

        async function deleteCaption(imgUrl) {
            if(confirm("আপনি কি নিশ্চিত যে শুধু ক্যাপশনটি মুছে ফেলতে চান?")) {
                const img = galleryData.find(d => d.url === imgUrl);
                if(img) img.caption = "";
                try {
                    await fetch(API_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'edit', url: imgUrl, caption: "" })
                    });
                } catch(err) {}
                alert("ক্যাপশন মুছে ফেলা হয়েছে!");
                renderAdminList(); renderDrum('নিজ', 'self'); renderDrum('ফুল', 'flower'); renderDrum('প্রকৃতি', 'nature');
                if(document.getElementById('gridOverlay').style.display === 'block') closeGrid();
            }
        }

        async function deletePhotoRecord(imgUrl) {
            if (confirm("আপনি কি নিশ্চিত যে এই ছবিটি ডিলিট করতে চান?")) {
                galleryData = galleryData.filter(d => d.url !== imgUrl); 
                try {
                    await fetch(API_URL, {
                        method: 'DELETE', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'delete', url: imgUrl })
                    });
                } catch(e) { console.log("API Error"); }
                
                alert("ছবিটি ডিলিট করা হয়েছে!");
                renderDrum('নিজ', 'self'); renderDrum('ফুল', 'flower'); renderDrum('প্রকৃতি', 'nature');
                if(document.getElementById('manageBox').style.display === 'block') renderAdminList();
                if(document.getElementById('gridOverlay').style.display === 'block') closeGrid();
            }
        }
        
        let logoutTimer;
        function resetLogoutTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(() => {
                if (localStorage.getItem('noman_auth')) {
                    localStorage.removeItem('noman_auth');
                    alert("নিষ্ক্রিয়তার কারণে অটো লগআউট করা হয়েছে!");
                    location.reload();
                }
            }, 5 * 60 * 1000); 
        }
        
        window.addEventListener('mousemove', resetLogoutTimer);
        window.addEventListener('keydown', resetLogoutTimer);
        window.addEventListener('click', resetLogoutTimer);
        window.addEventListener('scroll', resetLogoutTimer);
        
        if (!sessionStorage.getItem('visited_session')) {
            localStorage.removeItem('noman_auth');
            sessionStorage.setItem('visited_session', 'true');
        }

        document.addEventListener('DOMContentLoaded', () => {
            resetLogoutTimer();
            
            const logoEl = document.querySelector('.logo');
            if (logoEl) logoEl.style.textDecoration = 'none';

            const header = document.querySelector('header');
            const adminBtn = document.querySelector('.admin-btn');
            
            if (header && adminBtn) {
                const navWrapper = document.createElement('div');
                navWrapper.style.display = 'flex';
                navWrapper.style.alignItems = 'center';
                navWrapper.style.gap = '15px';

                const themeIco = document.createElement('div');
                themeIco.className = 'theme-ico';
                themeIco.innerHTML = '🌙';
                themeIco.title = 'মুড পরিবর্তন করুন';
                
                themeIco.onclick = () => {
                    document.body.classList.toggle('bright-mode');
                    if(document.body.classList.contains('bright-mode')) {
                        themeIco.innerHTML = '☀️';
                        localStorage.setItem('noman_theme', 'bright');
                    } else {
                        themeIco.innerHTML = '🌙';
                        localStorage.setItem('noman_theme', 'dark');
                    }
                };

                if(localStorage.getItem('noman_theme') === 'bright') {
                    document.body.classList.add('bright-mode');
                    themeIco.innerHTML = '☀️';
                }

                const homeBtn = document.createElement('a');
                homeBtn.href = 'index.html';
                homeBtn.className = 'nav-home-btn';
                homeBtn.innerText = 'হোম';

                adminBtn.parentNode.removeChild(adminBtn);
                
                navWrapper.appendChild(themeIco);
                navWrapper.appendChild(homeBtn);
                navWrapper.appendChild(adminBtn);
                
                header.appendChild(navWrapper);
            }
        });
    </script>
</body>
</html>
