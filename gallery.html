<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৩ডি ফটোগ্রাফি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: 700; color: #00d2ff; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav a { color: #fff; text-decoration: none; cursor: pointer; font-weight: 500; }

        /* ৩ডি ড্রাম স্লাইডার এরিয়া */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .sec-bg { font-size: 7rem; opacity: 0.02; position: absolute; top: 10%; pointer-events: none; letter-spacing: 15px; }

        .slider-viewport { height: 450px; width: 100%; perspective: 1800px; display: flex; justify-content: center; align-items: center; }
        .drum { position: relative; width: 220px; height: 320px; transform-style: preserve-3d; }
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 15px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); backface-visibility: hidden;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* কন্ট্রোল বাটন */
        .controls { display: flex; gap: 30px; margin-top: 50px; z-index: 10; }
        .btn-slide { 
            width: 50px; height: 50px; border-radius: 50%; background: #00d2ff; color: #000; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            font-size: 20px; font-weight: bold; transition: 0.3s;
        }
        .btn-slide:hover { transform: scale(1.1); box-shadow: 0 0 15px #00d2ff; }

        /* এডমিন এরিয়া */
        .admin-nav { position: fixed; top: 80px; right: 20px; z-index: 1001; }
        .glass-box {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.15);
            display: none; width: 300px;
        }
        #previewBox { margin-top: 10px; display: none; text-align: center; border: 1px dashed #00d2ff; padding: 10px; border-radius: 10px; }
        #imgPreview { width: 100%; border-radius: 5px; margin-bottom: 5px; }
        #fileMeta { font-size: 12px; color: #00d2ff; }

        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
        .up-btn { background: #00d2ff; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AL NOMAN</div>
        <nav>
            <ul>
                <li><a onclick="gsap.to(window, {scrollTo: '#flower-sec'})">ফুল</a></li>
                <li><a onclick="gsap.to(window, {scrollTo: '#fruit-sec'})">ফল</a></li>
                <li><a onclick="gsap.to(window, {scrollTo: '#nature-sec'})">ন্যাচার</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-nav">
        <button onclick="toggleAdmin()" style="background:rgba(0,210,255,0.1); color:#00d2ff; border:1px solid #00d2ff; padding:5px 15px; border-radius:20px; cursor:pointer;">ADMIN</button>
        <div class="glass-box" id="adminBox">
            <div id="authArea">
                <input type="password" id="adminPassInput" placeholder="পাসওয়ার্ড দিন">
                <button onclick="checkPass()">লগিন</button>
            </div>
            <form id="uploadForm" style="display:none;">
                <input type="file" id="fileInp" accept="image/*" required>
                <div id="previewBox">
                    <img id="imgPreview" src="">
                    <p id="fileMeta"></p>
                </div>
                <select id="fileCat">
                    <option value="ফুল">ফুল (Flower)</option>
                    <option value="ফল">ফল (Fruit)</option>
                    <option value="ন্যাচার">ন্যাচার (Nature)</option>
                </select>
                <button type="submit" class="up-btn" id="subBtn">ড্রাইভে পাঠান</button>
            </form>
            <p id="msg" style="font-size:12px; text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <section id="flower-sec">
        <div class="sec-bg">FLOWERS</div>
        <div class="slider-viewport"><div class="drum" id="flower-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('flower', 1)">←</div><div class="btn-slide" onclick="rotateDrum('flower', -1)">→</div></div>
    </section>

    <section id="fruit-sec">
        <div class="sec-bg">FRUITS</div>
        <div class="slider-viewport"><div class="drum" id="fruit-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('fruit', 1)">←</div><div class="btn-slide" onclick="rotateDrum('fruit', -1)">→</div></div>
    </section>

    <section id="nature-sec">
        <div class="sec-bg">NATURE</div>
        <div class="slider-viewport"><div class="drum" id="nature-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('nature', 1)">←</div><div class="btn-slide" onclick="rotateDrum('nature', -1)">→</div></div>
    </section>

    <script>
        const GALLERY_API_URL = "/api/gallery"; // আপনার Vercel API পাথ
        const rotLog = { flower: 0, fruit: 0, nature: 0 };

        // ১. ডাটা লোড করা (GET Request)
        async function loadGallery() {
            try {
                const res = await fetch(GALLERY_API_URL);
                const data = await res.json();
                
                // আপনার ডাটাবেস বা গুগল শিটের লজিক অনুযায়ী কার্ড রেন্ডার
                // এখানে ডামি হিসেবে রেন্ডারিং লজিক দেওয়া হলো
                renderCategory('flower', data.filter(i => i.category === 'ফুল'));
                renderCategory('fruit', data.filter(i => i.category === 'ফল'));
                renderCategory('nature', data.filter(i => i.category === 'ন্যাচার'));
            } catch (e) { console.error("Load Failed", e); }
        }

        function renderCategory(cat, images) {
            const container = document.getElementById(`${cat}-drum`);
            if(!images.length) return;
            container.innerHTML = images.map(img => `<div class="card"><img src="${img.url}"></div>`).join('');
            rotateDrum(cat, 0); // ইনিশিয়াল পজিশন
        }

        // ২. ৩ডি ড্রাম স্লাইডিং লজিক (Ultra Smooth)
        function rotateDrum(cat, dir) {
            const drum = document.getElementById(`${cat}-drum`);
            const cards = drum.querySelectorAll('.card');
            if(!cards.length) return;

            const step = 360 / cards.length;
            rotLog[cat] += step * dir;

            cards.forEach((card, i) => {
                const angle = (i * step) + rotLog[cat];
                gsap.to(card, {
                    rotationY: angle,
                    z: 500, // ব্যাসার্ধ
                    x: Math.sin(angle * Math.PI / 180) * 500,
                    z: Math.cos(angle * Math.PI / 180) * 500,
                    duration: 1.5,
                    ease: "power4.out",
                    opacity: Math.cos(angle * Math.PI / 180) > 0.2 ? 1 : 0.1
                });
            });
        }

        // ৩. ফটো প্রিভিউ ও সাইজ
        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imgPreview').src = ev.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                    document.getElementById('fileMeta').innerText = `সাইজ: ${(file.size/1024).toFixed(2)} KB`;
                };
                reader.readAsDataURL(file);
            }
        };

        // ৪. আপলোড লজিক (POST Request)
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msg = document.getElementById('msg');
            const file = document.getElementById('fileInp').files[0];

            btn.disabled = true; msg.innerText = "প্রসেসিং...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const res = await fetch(GALLERY_API_URL, {
                        method: 'POST',
                        body: new URLSearchParams({
                            fileData: reader.result,
                            filename: file.name,
                            category: document.getElementById('fileCat').value
                        })
                    });
                    if(res.ok) {
                        msg.innerText = "সফলভাবে আপলোড হয়েছে!";
                        document.getElementById('uploadForm').reset();
                        document.getElementById('previewBox').style.display = 'none';
                    }
                } catch (err) { msg.innerText = "ব্যর্থ হয়েছে!"; }
                btn.disabled = false;
            };
        };

        function toggleAdmin() {
            const b = document.getElementById('adminBox');
            b.style.display = b.style.display === 'block' ? 'none' : 'block';
        }

        function checkPass() {
            if(document.getElementById('adminPassInput').value === "123") {
                document.getElementById('authArea').style.display = 'none';
                document.getElementById('uploadForm').style.display = 'block';
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
