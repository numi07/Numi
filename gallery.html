<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৩ডি ফটোগ্রাফি - আল নোমান শিকদার</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --accent: #0081ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        header {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: #ccc; text-decoration: none; cursor: pointer; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* সেকশন ডিজাইন */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-bottom: 1px solid var(--border); overflow: hidden; }
        .sec-bg { font-size: 12rem; opacity: 0.03; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; letter-spacing: 20px; font-weight: 700; width: 100%; text-align: center; }

        /* ৩ডি ড্রাম স্লাইডার */
        .slider-viewport { height: 450px; width: 100%; perspective: 2000px; display: flex; justify-content: center; align-items: center; }
        .drum { position: relative; width: 250px; height: 350px; transform-style: preserve-3d; }
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 20px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); backface-visibility: hidden;
            transition: filter 0.5s;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* কন্ট্রোল বাটন */
        .controls { display: flex; gap: 30px; margin-top: 60px; z-index: 10; }
        .btn-slide { 
            width: 60px; height: 60px; border-radius: 50%; background: var(--glass); color: #fff; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
            font-size: 24px; transition: 0.4s; border: 1px solid var(--border);
        }
        .btn-slide:hover { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }

        /* এডমিন এরিয়া উন্নত ডিজাইন */
        .admin-nav { position: fixed; top: 100px; right: 30px; z-index: 1001; }
        .admin-toggle { background: var(--glass); color: var(--primary); border: 1px solid var(--primary); padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .admin-toggle:hover { background: var(--primary); color: #000; }

        .glass-box {
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            display: none; width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-top: 15px;
        }
        
        .input-group { margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        #previewBox { margin-top: 15px; display: none; text-align: center; border: 1px dashed var(--primary); padding: 10px; border-radius: 12px; }
        #imgPreview { width: 100%; border-radius: 8px; margin-bottom: 5px; max-height: 150px; object-fit: cover; }
        
        .up-btn { background: linear-gradient(45deg, var(--primary), var(--accent)); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        .up-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #msg { font-size: 13px; text-align: center; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AL NOMAN</div>
        <nav>
            <ul>
                <li><a onclick="gsap.to(window, {scrollTo: '#flower-sec'})">ফুল</a></li>
                <li><a onclick="gsap.to(window, {scrollTo: '#fruit-sec'})">ফল</a></li>
                <li><a onclick="gsap.to(window, {scrollTo: '#nature-sec'})">ন্যাচার</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-nav">
        <button class="admin-toggle" onclick="toggleAdmin()">ADMIN ACCESS</button>
        <div class="glass-box" id="adminBox">
            <!-- লগিন এরিয়া -->
            <div id="authArea">
                <h4 style="margin-bottom:15px; text-align:center;">অ্যাডমিন লগিন</h4>
                <input type="password" id="adminPassInput" placeholder="পাসওয়ার্ড লিখুন..." onkeypress="handleEnter(event)">
                <button onclick="checkPass()" style="margin-top:10px; background:var(--primary); color:#000; font-weight:bold;">লগিন</button>
            </div>

            <!-- আপলোড ফরম -->
            <form id="uploadForm" style="display:none;">
                <h4 style="margin-bottom:15px; text-align:center; color:var(--primary);">ছবি আপলোড করুন</h4>
                <input type="file" id="fileInp" accept="image/*" required>
                <div id="previewBox">
                    <img id="imgPreview" src="">
                    <p id="fileMeta" style="font-size:10px; color:var(--primary)"></p>
                </div>
                <select id="fileCat" style="margin-top:10px;">
                    <option value="ফুল">ফুল (Flower)</option>
                    <option value="ফল">ফল (Fruit)</option>
                    <option value="ন্যাচার">ন্যাচার (Nature)</option>
                </select>
                <button type="submit" class="up-btn" id="subBtn">সার্ভারে সেভ করুন</button>
            </form>
            <p id="msg"></p>
        </div>
    </div>

    <!-- সেকশন গুলো -->
    <section id="flower-sec">
        <div class="sec-bg">FLOWERS</div>
        <div class="slider-viewport"><div class="drum" id="flower-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('flower', 1)">←</div><div class="btn-slide" onclick="rotateDrum('flower', -1)">→</div></div>
    </section>

    <section id="fruit-sec">
        <div class="sec-bg">FRUITS</div>
        <div class="slider-viewport"><div class="drum" id="fruit-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('fruit', 1)">←</div><div class="btn-slide" onclick="rotateDrum('fruit', -1)">→</div></div>
    </section>

    <section id="nature-sec">
        <div class="sec-bg">NATURE</div>
        <div class="slider-viewport"><div class="drum" id="nature-drum"></div></div>
        <div class="controls"><div class="btn-slide" onclick="rotateDrum('nature', 1)">←</div><div class="btn-slide" onclick="rotateDrum('nature', -1)">→</div></div>
    </section>

    <script>
        const GALLERY_API_URL = "/api/gallery"; 
        const rotLog = { flower: 0, fruit: 0, nature: 0 };

        // ১. ডাটা লোড ও ডামি ডাটা (যাতে খালি না দেখায়)
        async function loadGallery() {
            try {
                const res = await fetch(GALLERY_API_URL);
                const data = await res.json();
                renderCategory('flower', data.filter(i => i.category === 'ফুল'));
                renderCategory('fruit', data.filter(i => i.category === 'ফল'));
                renderCategory('nature', data.filter(i => i.category === 'ন্যাচার'));
            } catch (e) { 
                console.log("লাইভ ডাটা নেই, স্যাম্পল দেখাচ্ছি...");
                // স্যাম্পল ডাটা যদি API না থাকে
                const sample = [
                    {url: 'https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=500', category: 'ফুল'},
                    {url: 'https://images.unsplash.com/photo-1528825871115-3581a5387919?w=500', category: 'ফল'},
                    {url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500', category: 'ন্যাচার'}
                ];
                renderCategory('flower', sample); 
                renderCategory('fruit', sample); 
                renderCategory('nature', sample); 
            }
        }

        function renderCategory(cat, images) {
            const container = document.getElementById(`${cat}-drum`);
            if(!images.length) return;
            
            // ছবি সংখ্যা কম হলে ৩ডি ইফেক্ট বুঝা যায় না, তাই লুপ করে বাড়ানো হয়েছে
            let displayImages = [...images];
            while(displayImages.length < 6) displayImages = [...displayImages, ...images];

            container.innerHTML = displayImages.map(img => `<div class="card"><img src="${img.url}"></div>`).join('');
            setTimeout(() => rotateDrum(cat, 0), 100); 
        }

        // ২. ৩ডি ড্রাম এনিমেশন
        function rotateDrum(cat, dir) {
            const drum = document.getElementById(`${cat}-drum`);
            const cards = drum.querySelectorAll('.card');
            const total = cards.length;
            if(!total) return;

            const angleStep = 360 / total;
            rotLog[cat] += angleStep * dir;

            cards.forEach((card, i) => {
                const currentAngle = (i * angleStep) + rotLog[cat];
                const radius = 450; // স্লাইডার ব্যাসার্ধ
                
                const rad = currentAngle * Math.PI / 180;
                const x = Math.sin(rad) * radius;
                const z = Math.cos(rad) * radius;

                gsap.to(card, {
                    x: x,
                    z: z,
                    rotationY: currentAngle,
                    duration: 1.2,
                    ease: "expo.out",
                    opacity: z > -100 ? 1 : 0.2, // পেছনের কার্ড হালকা দেখাবে
                    filter: z > 0 ? "blur(0px)" : "blur(2px)"
                });
            });
        }

        // ৩. অ্যাডমিন ফাংশনালিটি
        function toggleAdmin() {
            const b = document.getElementById('adminBox');
            b.style.display = b.style.display === 'block' ? 'none' : 'block';
        }

        // এন্টার কি প্রেস হ্যান্ডলার
        function handleEnter(e) {
            if (e.key === "Enter") {
                checkPass();
            }
        }

        function checkPass() {
            const pass = document.getElementById('adminPassInput').value;
            const msg = document.getElementById('msg');
            
            if(pass === "123") { // আপনার পাসওয়ার্ড এখানে দিন
                document.getElementById('authArea').style.display = 'none';
                document.getElementById('uploadForm').style.display = 'block';
                msg.innerText = "লগিন সফল!";
                msg.style.color = "#00d2ff";
            } else {
                msg.innerText = "ভুল পাসওয়ার্ড!";
                msg.style.color = "#ff4d4d";
                gsap.to("#adminBox", { x: 10, repeat: 3, yoyo: true, duration: 0.05 });
            }
        }

        // ৪. প্রিভিউ এবং আপলোড
        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imgPreview').src = ev.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                    document.getElementById('fileMeta').innerText = `Size: ${(file.size/1024).toFixed(2)} KB`;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msg = document.getElementById('msg');
            const file = document.getElementById('fileInp').files[0];

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";
            msg.innerText = "";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    // এখানে আপনার সার্ভার বা ভেরসেল ব্যাকএন্ড কল হবে
                    const response = await fetch(GALLERY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            fileData: reader.result,
                            category: document.getElementById('fileCat').value
                        })
                    });

                    if(response.ok) {
                        msg.innerText = "ছবি সফলভাবে সেভ হয়েছে!";
                        msg.style.color = "#00ff88";
                        document.getElementById('uploadForm').reset();
                        document.getElementById('previewBox').style.display = 'none';
                        loadGallery(); // গ্যালারি রিফ্রেশ
                    } else {
                        throw new Error();
                    }
                } catch (err) {
                    msg.innerText = "আপলোড ব্যর্থ হয়েছে!";
                    msg.style.color = "#ff4d4d";
                } finally {
                    btn.disabled = false;
                    btn.innerText = "সার্ভারে সেভ করুন";
                }
            };
        };

        window.onload = loadGallery;
    </script>
</body>
</html>
