<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আল নোমান শিকদার - নান্দনিক গ্যালারি</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; padding-bottom: 100px; }

        /* ইউনিক ব্যাকগ্রাউন্ড এফেক্ট */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #003a4d 0%, #05070a 100%);
            z-index: -1; opacity: 0.5;
        }

        header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 22px; font-weight: 700; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .admin-btn { background: var(--accent); color: #000; padding: 6px 15px; border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer; }

        /* সেকশন স্টাইল */
        .sec-container { padding: 40px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sec-title-wrap { padding: 0 20px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sec-title-wrap h2 { font-size: 28px; position: relative; }
        .sec-title-wrap h2::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 40px; height: 3px; background: var(--accent); }
        .btn-view-all { color: var(--accent); font-size: 14px; cursor: pointer; text-decoration: underline; }

        /* ৩ডি ভিউপোর্ট */
        .viewport { height: 450px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        .drum { position: relative; width: 200px; height: 280px; transform-style: preserve-3d; }
        
        .card { 
            position: absolute; width: 200px; height: 280px; border-radius: 20px; 
            overflow: hidden; border: 1px solid var(--border); background: var(--card-bg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); backface-visibility: hidden; cursor: pointer;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-caption { position: absolute; bottom: 0; width: 100%; padding: 15px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-size: 12px; text-align: center; }

        .nav-controls { display: flex; justify-content: center; gap: 40px; margin-top: -30px; }
        .nav-c-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .nav-c-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); }

        /* গ্রিড ভিউ (সব ছবি) */
        .grid-overlay { position: fixed; inset: 0; background: #05070a; z-index: 2000; display: none; overflow-y: auto; padding: 25px; }
        .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .grid-card { border-radius: 15px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .grid-card img { width: 100%; height: auto; display: block; } /* অটো হাইট যাতে ফটো সম্পূর্ণ দেখা যায় */
        .grid-card p { padding: 10px; font-size: 12px; text-align: center; opacity: 0.8; }

        /* লাইটবক্স (ফুল ফটো ভিউ) */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-lb { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        /* বটম বার */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px;
            background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(20px);
            border-radius: 50px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .b-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        .b-item.active { opacity: 1; color: var(--accent); }
        .b-icon { font-size: 20px; }

        /* অ্যাডমিন প্যানেল */
        .admin-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: #161b22; border-radius: 30px 30px 0 0; padding: 30px; z-index: 2100; transition: 0.5s; box-shadow: 0 -10px 50px rgba(0,0,0,0.5); }
        .admin-panel.open { bottom: 0; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; }
        .sub-btn { background: var(--accent); color: #000; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo">নোমান শিকদার</div>
        <div class="admin-btn" onclick="openAdmin()">অ্যাডমিন</div>
    </header>

    <!-- ক্যাটাগরি ১: নিজ -->
    <div class="sec-container" id="sec-self">
        <div class="sec-title-wrap">
            <h2>নিজ</h2>
            <div class="btn-view-all" onclick="showGrid('নিজ')">সব দেখুন →</div>
        </div>
        <div class="viewport">
            <div class="drum" id="drum-self"></div>
        </div>
        <div class="nav-controls">
            <div class="nav-c-btn" onclick="rotateDrum('self', 1)">←</div>
            <div class="nav-c-btn" onclick="rotateDrum('self', -1)">→</div>
        </div>
    </div>

    <!-- ক্যাটাগরি ২: ফুল -->
    <div class="sec-container" id="sec-flower">
        <div class="sec-title-wrap">
            <h2>ফুল</h2>
            <div class="btn-view-all" onclick="showGrid('ফুল')">সব দেখুন →</div>
        </div>
        <div class="viewport">
            <div class="drum" id="drum-flower"></div>
        </div>
        <div class="nav-controls">
            <div class="nav-c-btn" onclick="rotateDrum('flower', 1)">←</div>
            <div class="nav-c-btn" onclick="rotateDrum('flower', -1)">→</div>
        </div>
    </div>

    <!-- ক্যাটাগরি ৩: ন্যাচার -->
    <div class="sec-container" id="sec-nature">
        <div class="sec-title-wrap">
            <h2>ন্যাচার</h2>
            <div class="btn-view-all" onclick="showGrid('ন্যাচার')">সব দেখুন →</div>
        </div>
        <div class="viewport">
            <div class="drum" id="drum-nature"></div>
        </div>
        <div class="nav-controls">
            <div class="nav-c-btn" onclick="rotateDrum('nature', 1)">←</div>
            <div class="nav-c-btn" onclick="rotateDrum('nature', -1)">→</div>
        </div>
    </div>

    <!-- গ্রিড ওভারলে -->
    <div class="grid-overlay" id="gridOverlay">
        <div class="grid-header">
            <h2 id="gridTitle">সব ছবি</h2>
            <div class="admin-btn" onclick="closeGrid()">বন্ধ করুন</div>
        </div>
        <div class="grid-container" id="gridContainer"></div>
    </div>

    <!-- লাইটবক্স -->
    <div class="lightbox" id="lightbox" onclick="this.style.display='none'">
        <span class="close-lb">&times;</span>
        <img id="lbImg" src="">
    </div>

    <!-- অ্যাডমিন প্যানেল -->
    <div class="admin-panel" id="adminPanel">
        <div id="loginSection">
            <h3 style="margin-bottom:20px">অ্যাডমিন লগিন</h3>
            <input type="password" id="pass" placeholder="পাসওয়ার্ড...">
            <button class="sub-btn" onclick="login()">লগিন করুন</button>
            <button onclick="closeAdmin()" style="background:none">বন্ধ করুন</button>
        </div>
        <div id="uploadSection" style="display:none">
            <h3 style="margin-bottom:20px; color:var(--accent)">নতুন ছবি যোগ করুন</h3>
            <input type="file" id="fInp" accept="image/*">
            <input type="text" id="capInp" placeholder="ছবির ক্যাপশন...">
            <select id="catInp">
                <option value="নিজ">নিজ</option>
                <option value="ফুল">ফুল</option>
                <option value="ন্যাচার">ন্যাচার</option>
            </select>
            <button class="sub-btn" id="upBtn" onclick="upload()">আপলোড করুন</button>
            <button onclick="logout()" style="color:#ff4d4d">লগআউট</button>
        </div>
    </div>

    <!-- বটম নেভিগেশন -->
    <div class="bottom-nav">
        <div class="b-item active" onclick="scrollToSec('top')">
            <span class="b-icon">🏠</span>
            <span>হোম</span>
        </div>
        <div class="b-item" onclick="scrollToSec('sec-self')">
            <span class="b-icon">👤</span>
            <span>নিজ</span>
        </div>
        <div class="b-item" onclick="scrollToSec('sec-flower')">
            <span class="b-icon">🌸</span>
            <span>ফুল</span>
        </div>
        <div class="b-item" onclick="scrollToSec('sec-nature')">
            <span class="b-icon">🌿</span>
            <span>ন্যাচার</span>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollToPlugin);
        const API_URL = "/api/gallery"; // আপনার Vercel/Apps Script URL
        let allData = [];
        const rot = { self: 0, flower: 0, nature: 0 };

        // ১. ডাটা লোড ও ড্রাম রেন্ডার
        async function load() {
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                renderDrum('নিজ', 'self');
                renderDrum('ফুল', 'flower');
                renderDrum('ন্যাচার', 'nature');
            } catch (e) { console.error("Load failed"); }
        }

        function renderDrum(catName, id) {
            const drum = document.getElementById('drum-' + id);
            const filtered = allData.filter(d => d.category === catName);
            if(!filtered.length) { drum.innerHTML = "ফটো নেই"; return; }

            const radius = Math.round( (210 / 2) / Math.tan( Math.PI / filtered.length ) ) + 50;
            drum.innerHTML = filtered.map((img, i) => {
                const angle = i * (360 / filtered.length);
                return `
                    <div class="card" onclick="fullView('${img.url}')" style="transform: rotateY(${angle}deg) translateZ(${radius}px)">
                        <img src="${img.url}">
                        <div class="card-caption">${img.caption || '...'}</div>
                    </div>
                `;
            }).join('');
        }

        function rotateDrum(id, dir) {
            const drum = document.getElementById('drum-' + id);
            const cat = (id === 'self' ? 'নিজ' : id === 'flower' ? 'ফুল' : 'ন্যাচার');
            const count = allData.filter(d => d.category === cat).length;
            if(!count) return;
            rot[id] += (360 / count) * dir;
            gsap.to(drum, { rotationY: rot[id], duration: 1, ease: "power2.out" });
        }

        // ২. নেভিগেশন ও স্ক্রল
        function scrollToSec(id) {
            if(id === 'top') {
                gsap.to(window, {scrollTo: 0, duration: 0.8});
            } else {
                gsap.to(window, {scrollTo: {y: "#" + id, offsetY: 80}, duration: 0.8});
            }
            // একটিভ ক্লাস আপডেট
            document.querySelectorAll('.b-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // ৩. সব দেখুন গ্রিড
        function showGrid(cat) {
            const overlay = document.getElementById('gridOverlay');
            const container = document.getElementById('gridContainer');
            document.getElementById('gridTitle').innerText = cat + " - সব ছবি";
            
            const filtered = allData.filter(d => d.category === cat);
            container.innerHTML = filtered.map(img => `
                <div class="grid-card" onclick="fullView('${img.url}')">
                    <img src="${img.url}">
                    <p>${img.caption || '...'}</p>
                </div>
            `).join('');
            
            overlay.style.display = "block";
            gsap.from(overlay, {opacity: 0, y: 50, duration: 0.4});
        }
        function closeGrid() { document.getElementById('gridOverlay').style.display = "none"; }

        // ৪. লাইটবক্স
        function fullView(url) {
            document.getElementById('lbImg').src = url;
            document.getElementById('lightbox').style.display = "flex";
        }

        // ৫. অ্যাডমিন প্যানেল
        function openAdmin() { document.getElementById('adminPanel').classList.add('open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('open'); }

        async function login() {
            const pass = document.getElementById('pass').value;
            const res = await fetch(`${API_URL}?action=login&pass=${pass}`);
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('noman_admin', '1');
                checkStatus();
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        function checkStatus() {
            if(localStorage.getItem('noman_admin')) {
                document.getElementById('loginSection').style.display = "none";
                document.getElementById('uploadSection').style.display = "block";
            }
        }

        function logout() { localStorage.removeItem('noman_admin'); location.reload(); }

        async function upload() {
            const file = document.getElementById('fInp').files[0];
            const btn = document.getElementById('upBtn');
            if(!file) return alert("ফাইল বাছুন");
            
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        fileData: reader.result,
                        filename: file.name,
                        caption: document.getElementById('capInp').value,
                        category: document.getElementById('catInp').value
                    })
                });
                location.reload();
            };
        }

        window.onload = () => { load(); checkStatus(); };
    </script>
</body>
</html>
